<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>日本語</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;
  --c:#1c1c1c;        /* card surface */
  --c2:#272727;       /* darker surface / progress bg */
  --nav:#161616;      /* tab bar bg */
  --a:#8384c7;        /* accent */
  --al:#868fbe;       /* accent-light / section labels */
  --t:#fff;           /* text */
  --t2:#868fbe;       /* secondary text */
  --ic:#434343;       /* inactive icon */
  --g:#7aff78;        /* green / знаю */
  --y:#fff285;        /* yellow / учу */
  --r:#ff3c3c;        /* red / не знаю */
}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;padding-bottom:110px;min-height:100vh}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pg{animation:up .16s ease;padding:0 16px}

/* ─── Tab bar ─── */
.bnav{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  width:calc(100% - 24px);max-width:456px;
  background:var(--nav);border-radius:300px;
  display:flex;align-items:center;justify-content:space-around;
  padding:10px 8px;z-index:200;
}
.bnav-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:none;border:none;cursor:pointer;
  color:var(--ic);font-size:11px;font-weight:500;
  padding:4px 12px;border-radius:300px;transition:color .15s;
  min-width:52px;
}
.bnav-btn.active{color:var(--a)}
.bnav-icon{
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
}
.bnav-icon svg{width:28px;height:28px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* ─── top_icon ─── */
.top-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--a);line-height:1;flex-shrink:0}
.top-icon img{width:100%;height:100%;object-fit:contain;display:block}
.hero-icon{display:flex;justify-content:center;padding:16px 16px 12px}
.hero-icon img{width:60px;height:auto;display:block}

/* ─── Page header ─── */
.phdr{padding:16px 16px 8px;display:flex;align-items:center;gap:12px}
.phdr-title{font-size:20px;font-weight:700;flex:1}
.phdr-back{background:var(--c);border:none;color:var(--t);font-size:13px;cursor:pointer;padding:7px 14px;border-radius:300px}

/* ─── Type tabs (Слова | Кандзи) ─── */
.ttabs{display:flex;gap:8px;padding:4px 16px 12px}
.ttab{padding:8px 20px;border-radius:300px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;background:var(--c);color:var(--t)}
.ttab.on{background:var(--a);color:#fff}

/* ─── Stats row ─── */
.stats{display:flex;gap:8px;padding:0 16px 12px}
.sbox{flex:1;background:var(--c);border-radius:16px;padding:14px 10px;text-align:center}
.snum{font-size:36px;font-weight:400;line-height:1}
.slbl{font-size:12px;color:var(--t);margin-top:4px}
.sbox.g .snum{color:var(--g)}
.sbox.y .snum{color:var(--y)}
.sbox.r .snum{color:var(--r)}

/* ─── Progress card ─── */
.prog-card{margin:0 16px 12px;background:var(--c);border-radius:16px;padding:14px 16px}
.prog-bar-wrap{height:6px;background:var(--c2);border-radius:300px;overflow:hidden;margin-bottom:8px}
.prog-bar{height:100%;background:var(--al);border-radius:300px;transition:width .4s}
.prog-info{display:flex;justify-content:space-between;font-size:12px;color:var(--al)}

/* ─── Action grid (Главная) ─── */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 12px}
.act-btn{background:var(--c);border:none;color:var(--t);border-radius:16px;padding:14px;cursor:pointer;text-align:left;transition:background .15s;min-height:58px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500}
.act-btn:active{background:var(--c2)}
.act-btn.primary{background:var(--a)}
.act-btn.primary:active{background:#7374b5}

/* ─── Config card ─── */
.cfg-card{background:var(--c);border-radius:16px;padding:14px 16px;margin:0 16px 8px}
.cfg-lbl{font-size:12px;color:var(--al);margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 14px;height:36px;border-radius:16px;border:none;font-size:16px;cursor:pointer;background:var(--c2);color:var(--t);transition:all .15s;font-weight:400;display:flex;align-items:center}
.chip.on{background:var(--a);color:#fff}
/* side-by-side config (filter + count) */
.cfg-row{display:flex;gap:8px;padding:0 16px 8px}
.cfg-row .cfg-card{flex:1;margin:0}

/* ─── Start button ─── */
.start-row{padding:8px 16px 0;display:flex;justify-content:flex-end}
.start-btn{background:var(--a);border:none;color:#fff;border-radius:16px;padding:7px 24px;font-size:13px;cursor:pointer;transition:opacity .15s}
.start-btn:active{opacity:.8}

/* ─── Full-width button ─── */
.btn{display:flex;align-items:center;justify-content:center;padding:14px;border-radius:300px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;width:100%}
.btn:active{opacity:.75}
.btn-p{background:var(--a);color:#fff}
.btn-s{background:var(--c);color:var(--t)}
.btn-d{background:rgba(255,60,60,.15);color:var(--r)}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn-row .btn{flex:1}

/* ─── Flashcard ─── */
.fc-counter{font-size:18px;text-align:center;padding:8px 16px 12px}
.fc-wrap{perspective:1000px;min-height:260px;margin:0 16px 14px;cursor:pointer}
.fc{width:100%;display:grid;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{grid-area:1/1;background:var(--c);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;backface-visibility:hidden;-webkit-backface-visibility:hidden;min-height:260px}
.fc-back{transform:rotateY(180deg);background:var(--c2)}
.fc-sbar{position:absolute;top:0;left:0;right:0;height:4px;border-radius:16px 16px 0 0}
.fc-sbar.g{background:var(--g)}.fc-sbar.y{background:var(--y)}.fc-sbar.r{background:var(--c2)}
/* Kanji card face */
.fc-kanji{font-size:76px;font-weight:400;color:var(--a);line-height:1}
.fc-kana{font-size:36px;font-weight:400;color:var(--a);line-height:1;margin-top:4px}
.fc-meanings{margin-top:12px;text-align:center}
.fc-mn{font-size:12px;color:var(--t);line-height:1.6}
.fc-tap{font-size:12px;color:var(--t2);margin-top:12px}
/* Word card face (non-kanji) */
.fc-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--t2);margin-bottom:8px}
.fc-main{font-size:60px;line-height:1;color:var(--t);text-align:center}
.fc-main.sm{font-size:22px}
/* Back side rows */
.fc-back-body{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
/* On/kun label (legacy, kept for compat) */
.fc-onkun{display:flex;flex-direction:column;gap:4px;align-items:center;margin-top:6px}
.fc-okrow{font-size:12px;color:var(--t)}
.fc-okrow span{color:var(--a);font-size:16px;margin-left:4px}

/* ─── Card Variant System (Figma 31:112 / 33:235) ─── */
.cv-root{width:100%;display:flex;flex-direction:column;align-items:center;gap:20px}
.cv-top{display:flex;flex-direction:row;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap}
.cv-main{font-size:52px;line-height:1;color:var(--t);font-weight:400}
.cv-readings{display:flex;flex-direction:column;gap:12px}
.cv-rread{display:flex;flex-direction:column;gap:2px}
.cv-rl{font-size:12px;color:var(--t);line-height:1.2}
.cv-rv{font-size:20px;color:var(--a);line-height:1.2;word-break:break-word}
.cv-kana-lg{font-size:36px;color:var(--a);line-height:1}
.cv-meanings{width:280px;max-width:100%;display:flex;flex-direction:column;gap:4px}
.cv-mn{display:flex;flex-direction:row;align-items:baseline;gap:6px}
.cv-mi{font-size:12px;color:var(--t);line-height:1.2;flex-shrink:0}
.cv-mt{font-size:16px;color:var(--t);line-height:1.3;word-break:break-word}

/* ─── Mark buttons ─── */
.mark-row{display:flex;gap:8px;padding:0 16px;margin-bottom:8px}
.mbtn{flex:1;height:36px;border-radius:300px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:500;transition:opacity .15s}
.mbtn:active{opacity:.7}
.mbtn.r{background:rgba(255,60,60,.15);color:var(--r)}
.mbtn.y{background:rgba(255,242,133,.15);color:var(--y)}
.mbtn.g{background:rgba(122,255,120,.15);color:var(--g)}

/* ─── Stop/Skip row ─── */
.stop-row{display:flex;gap:8px;padding:0 16px}
.stop-btn{flex:1;height:27px;background:var(--c);border:none;color:var(--t);border-radius:16px;font-size:12px;cursor:pointer;transition:opacity .15s}
.stop-btn:active{opacity:.7}

/* ─── Quiz score badges (Figma: pill 100×20, border) ─── */
.qscore{display:flex;align-items:center;justify-content:center;gap:4px;padding:0 16px;margin-bottom:12px;flex-wrap:wrap}
.qbadge{display:flex;align-items:center;justify-content:center;gap:10px;min-width:100px;height:20px;padding:6px 8px;border-radius:16px;border:1px solid var(--a);font-size:12px;color:var(--t);background:transparent;line-height:1}
.qbadge.qbad{border-color:#ff4f4f}
.qbadge.qok{border-color:#7aff78}

/* ─── Quiz question card (Figma: h280, p16, gap20) ─── */
.quiz-q{background:var(--c);border-radius:16px;padding:16px;margin:0 16px 12px;min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center}
.quiz-ql{font-size:12px;color:var(--al)}
.quiz-qm{font-size:52px;line-height:1}
.quiz-qm.sm{font-size:20px}
.quiz-qh{font-size:14px;color:var(--t2)}

/* ─── Quiz options panel (Figma: card wrap + label) ─── */
.quiz-panel{background:var(--c);border-radius:16px;padding:8px;margin:0 16px 12px;display:flex;flex-direction:column;gap:16px;align-items:center}
.quiz-panel-lbl{font-size:12px;color:var(--al);text-align:center}
.quiz-opts{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:4px;width:100%}
.qopt{background:var(--c);border:1px solid var(--a);color:var(--t);border-radius:4px;padding:8px 6px;font-size:16px;cursor:pointer;text-align:center;line-height:1.2;overflow-wrap:anywhere;min-width:0;min-height:54px;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s}
.qopt.sel{background:var(--a);color:#fff}
.qopt.ok{background:rgba(122,255,120,.18);border-color:var(--g);color:var(--g)}
.qopt.bad{background:rgba(255,60,60,.18);border-color:var(--r);color:var(--r)}
.qopt:disabled{cursor:default}

/* ─── Quiz input (Figma: pill, border, 12px) ─── */
.quiz-inp{width:100%;background:transparent;border:1px solid var(--a);border-radius:300px;color:var(--t);font-size:13px;padding:6px 12px;outline:none;font-family:inherit;text-align:center;transition:border-color .15s,box-shadow .15s}
.quiz-inp::placeholder{color:#5a5a5a}
.quiz-inp:focus{box-shadow:0 0 0 2px rgba(131,132,199,.4)}
.quiz-inp.ok{border-color:var(--g);color:var(--g)}
.quiz-inp.bad{border-color:var(--r);color:var(--r)}
.quiz-inp:disabled{opacity:.9;cursor:default}
.quiz-result{font-size:13px;text-align:center}
.quiz-result.ok{color:var(--g)}
.quiz-result.bad{color:var(--r)}

/* ─── Quiz bottom actions (Стоп / Пропустить) ─── */
.quiz-actions{display:flex;gap:4px;justify-content:center;padding:0 16px;margin-bottom:10px}
.qact-btn{min-width:100px;height:27px;padding:6px 8px;background:var(--c);border:1px solid var(--a);color:var(--t);border-radius:16px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.qact-btn:active{opacity:.7}

/* ─── Next button (quiz) ─── */
.next-btn{margin:0 16px 10px;background:var(--a);border:none;color:#fff;border-radius:16px;padding:10px;font-size:13px;font-weight:500;width:calc(100% - 32px);cursor:pointer;transition:opacity .15s}
.next-btn:active{opacity:.8}

/* ─── Words list ─── */
.wfilter{display:flex;gap:6px;padding:0 16px 10px;align-items:center}
.wf-tab{padding:8px 18px;border-radius:300px;border:none;font-size:14px;background:var(--c);color:var(--t);cursor:pointer}
.wf-tab.on{background:var(--a);color:#fff}
.wf-import{padding:7px 12px;border-radius:4px;border:none;font-size:12px;background:var(--c);color:var(--t);cursor:pointer;display:flex;align-items:center;gap:5px;margin-left:auto}
.wf-search{padding:7px 12px;border-radius:4px;border:none;font-size:12px;background:var(--c);color:var(--t);cursor:pointer;display:flex;align-items:center;gap:5px}
.wsearch-wrap{padding:0 16px 10px;position:relative}
.wsearch{width:100%;background:var(--c);border:none;border-radius:300px;color:var(--t);font-size:13px;padding:9px 16px 9px 36px;outline:none;font-family:inherit}
.wsearch::placeholder{color:var(--t2)}
.wsearch-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.wlist{background:var(--c);border-radius:16px;margin:0 16px 10px;overflow:hidden}
.witem{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.05);gap:12px}
.witem:last-child{border-bottom:none}
.wkanji{font-size:24px;min-width:40px;text-align:center}
.winfo{flex:1;min-width:0}
.wreading{font-size:12px;color:var(--al)}
.wtrans{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wdot{width:9px;height:9px;border-radius:50%;background:var(--c2);flex-shrink:0}
.wdot.g{background:var(--g)}.wdot.y{background:var(--y)}.wdot.r{background:var(--r)}
.wok{font-size:11px;color:var(--al)}

/* ─── Settings ─── */
.sset{background:var(--c);border-radius:16px;overflow:hidden;margin:0 16px 12px}
.sset-lbl{font-size:12px;color:var(--al);padding:0 16px;margin-bottom:6px}
.srow{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}
.srow:last-child{border-bottom:none}
.srow-l{flex:1;font-size:14px}
.srow-r{font-size:13px;color:var(--al)}
.confirm-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05);gap:8px}
.confirm-row:last-child{border-bottom:none}
.confirm-text{flex:1;font-size:13px}
.confirm-no,.confirm-yes{border:none;border-radius:300px;padding:6px 16px;font-size:12px;cursor:pointer}
.confirm-no{background:var(--c2);color:var(--t)}
.confirm-yes{background:rgba(255,60,60,.15);color:var(--r)}

/* ─── Import ─── */
.dropzone{border:2px dashed var(--c2);border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin:0 16px 10px}
.dropzone.over{border-color:var(--a);background:rgba(131,132,199,.07)}
.dz-icon{font-size:36px;margin-bottom:8px}
.dz-text{font-size:14px;font-weight:500;color:var(--t)}
.dz-hint{font-size:12px;color:var(--t2);margin-top:4px}
.tbl-wrap{overflow-x:auto;border-radius:12px;overflow:hidden;margin:0 16px 10px}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--c)}
th{background:var(--c2);padding:8px 10px;text-align:left;font-weight:600;color:var(--al);font-size:11px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
td{padding:7px 10px;border-top:1px solid rgba(255,255,255,.05);white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis}

/* ─── Empty ─── */
.empty{text-align:center;padding:60px 20px;color:var(--t2)}
.ei{font-size:56px;margin-bottom:14px}
.et{font-size:18px;font-weight:700;color:var(--t);margin-bottom:6px}
.eb{font-size:13px;margin-bottom:20px}

/* ─── Done ─── */
.done{text-align:center;padding:40px 16px}
.done-i{font-size:56px;margin-bottom:12px}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.rc{border-radius:16px;padding:14px;text-align:center}
.rc.g{background:rgba(122,255,120,.12);color:var(--g)}
.rc.y{background:rgba(255,242,133,.12);color:var(--y)}
.rc.r{background:rgba(255,60,60,.12);color:var(--r)}
.rn{font-size:32px;font-weight:700}.rl{font-size:12px;margin-top:3px;opacity:.8}

/* ─── Sub-tabs (Карточки / Квиз) ─── */
.sub-tabs{display:flex;background:var(--c);border-radius:300px;padding:4px;gap:4px;margin:0 16px 14px}
.stab{flex:1;padding:8px;border-radius:300px;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;background:none;color:var(--t2)}
.stab.on{background:var(--c2);color:var(--t)}

/* ─── Toast ─── */
#toast{position:fixed;top:14px;left:50%;transform:translate(-50%,-20px);background:transparent;color:var(--t2);font-size:12px;z-index:300;opacity:0;transition:opacity .25s, transform .25s;white-space:nowrap;pointer-events:none;padding:4px 10px;letter-spacing:.2px}
#toast.show{opacity:1;transform:translate(-50%,0)}

/* ─── Error box ─── */
.err-box{background:rgba(255,60,60,.1);border:1px solid var(--r);border-radius:12px;padding:11px 14px;color:var(--r);font-size:13px;margin:0 16px 10px}

/* ─── Mono ─── */
.mono{font-family:'SFMono-Regular',Consolas,monospace;font-size:12px;color:var(--al);line-height:1.7}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
'use strict';
const tg=window.Telegram?.WebApp;
if(tg){tg.expand();tg.ready();}
function haptic(t='light'){tg?.HapticFeedback?.impactOccurred(t);}

/* ── SVG icons ── */

/* ── Persist ── */
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('jl4')||'{}');
    S.words=d.words||[]; S.progress=d.progress||{};
    S.kanjiItems=d.kanjiItems||[]; S.kanjiProgress=d.kanjiProgress||{};
    S.wordsCsv=d.wordsCsv||''; S.kanjiCsv=d.kanjiCsv||'';
    S.studyCfg={...S.studyCfg,...(d.studyCfg||{})};
    S.quizCfg={...S.quizCfg,...(d.quizCfg||{})};
    if(typeof S.quizCfg.question==='string')S.quizCfg.question=[S.quizCfg.question];
    if(typeof S.studyCfg.front==='string')S.studyCfg.front=[S.studyCfg.front];
    // Миграция on/kun: пересплитим безусловно — splitOnKun идемпотентен.
    // Раньше проверка пропускала случаи, когда импорт сложил всё в одно поле
    // (одна азбука), и второе оставалось пустым → на фронте дашы. В TG-вебвью
    // localStorage отдельный, и старые данные не правились.
    let migrated=false;
    S.kanjiItems.forEach(w=>{
      const combined=[w.reading,w.on_reading,w.kun_reading].filter(Boolean).join('・');
      if(!combined)return;
      const{on_reading,kun_reading}=splitOnKun(combined);
      const newOn=on_reading||'',newKun=kun_reading||'';
      if(newOn!==(w.on_reading||'')||newKun!==(w.kun_reading||'')||w.reading){
        w.on_reading=newOn;
        w.kun_reading=newKun;
        delete w.reading;
        migrated=true;
      }
    });
    if(migrated)save();
  }catch{}
}
function save(){
  try{
    localStorage.setItem('jl4',JSON.stringify({
      words:S.words,progress:S.progress,
      kanjiItems:S.kanjiItems,kanjiProgress:S.kanjiProgress,
      wordsCsv:S.wordsCsv,kanjiCsv:S.kanjiCsv,
      studyCfg:S.studyCfg,quizCfg:S.quizCfg,
    }));
  }catch{}
}

/* ── CSV parser ── */
const ALIAS={
  слово:'kanji',word:'kanji',кандзи:'kanji',kanji:'kanji',
  чтение:'reading',кана:'reading',reading:'reading',kana:'reading',
  'он':'on_reading','он-чтение':'on_reading',on:'on_reading',on_reading:'on_reading',onyomi:'on_reading',
  'кун':'kun_reading','кун-чтение':'kun_reading',kun:'kun_reading',kun_reading:'kun_reading',kunyomi:'kun_reading',
  значение:'meaning',meaning:'meaning',english:'meaning',eng:'meaning',
  перевод:'translation',translation:'translation',russian:'translation',rus:'translation',
  заметки:'notes',notes:'notes',note:'notes',
};
function parseLine(line,sep){
  const out=[];let cur='',q=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}
    else if(c===sep&&!q){out.push(cur.trim());cur='';}
    else cur+=c;
  }
  out.push(cur.trim());return out;
}
function detectSep(text){
  const row=text.split('\n')[0];
  const t=(row.match(/\t/g)||[]).length;
  // TAB имеет приоритет: табы никогда не встречаются внутри ячеек
  if(t>0)return'\t';
  const c=(row.match(/,/g)||[]).length,s=(row.match(/;/g)||[]).length;
  if(s>c)return';';return',';
}
function parseFile(text){
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const sep=detectSep(text);
  const rows=text.split(/\r?\n/).filter(l=>l.trim());
  if(rows.length<1)throw new Error('Файл пустой');
  const first=parseLine(rows[0],sep);
  const hasH=first.some(h=>{const k=h.toLowerCase().replace(/[\s\-]/g,'_');return!!(ALIAS[k]||ALIAS[h.toLowerCase()]);});
  if(!hasH){const rawRows=rows.map(r=>parseLine(r,sep));return{rawRows,colCount:first.length,hasHeaders:false};}
  const headers=first.map(h=>{const k=h.toLowerCase().replace(/[\s\-]/g,'_');return ALIAS[k]||ALIAS[h.toLowerCase()]||k;});
  const rawRows=rows.slice(1).map(r=>parseLine(r,sep));
  return{...applyMapping(rawRows,headers,S.importType==='kanji'),hasHeaders:true};
}
function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36);}
/* ── Katakana / Hiragana sets (explicit, from user spec) ── */
const KATA_SET=new Set([...'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヰヱヲンガギグゲゴザジズゼゾダヂヅデドバビブベボパピプペポァィゥェォッャュョヴ']);
const HIRA_SET=new Set([...'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわゐゑをんがぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽぁぃぅぇぉっゃゅょゔ']);
// ー (U+30FC) — нейтральный знак: определяем по предыдущему токену
function isHira(s){return[...s].some(c=>HIRA_SET.has(c));}
function isKata(s){return[...s].some(c=>KATA_SET.has(c));}
function splitOnKun(str){
  // Разбиваем по запятой, японской запятой, средней точке (・) и пробелам
  const parts=str.split(/[,、・\s]+/).filter(Boolean);
  const on=[],kun=[];
  for(let i=0;i<parts.length;i++){
    const p=parts[i];
    // Убираем ー и прочие нейтральные знаки для классификации
    const s=p.replace(/[ーー・～\u30FC\u30FE]/g,'');
    if(!s){
      // Токен состоит только из нейтральных знаков (напр. "ー")
      // Определяем по предыдущему классифицированному токену
      if(kun.length>0&&on.length===0)kun.push(p);
      else on.push(p);
      continue;
    }
    const hasKana=[...s].some(c=>HIRA_SET.has(c)||KATA_SET.has(c));
    if(!hasKana)continue; // не-кана (английский, цифры) — это не чтение, дропаем
    if(isKata(s)&&!isHira(s))on.push(p);
    else if(isHira(s)&&!isKata(s))kun.push(p);
    else on.push(p); // смешанный (кана+кана) → он
  }
  return{on_reading:on.join('・'),kun_reading:kun.join('・')};
}
function applyMapping(rawRows,mapping,isKanji=false){
  const words=[];
  for(const vals of rawRows){
    if(vals.every(v=>!v))continue;
    const w={id:uid()};
    mapping.forEach((fk,j)=>{if(fk)w[fk]=(vals[j]||'').trim();});
    if(isKanji){
      // Сплит on/kun: объединяем reading + on_reading + kun_reading и переразбиваем
      // по алфавиту (катакана → on, хирагана → kun). Идемпотентно для корректных данных.
      const hasLegacy=!!w.reading;
      const onBroken=w.on_reading&&isHira(w.on_reading);
      const kunBroken=w.kun_reading&&isKata(w.kun_reading);
      if(hasLegacy||onBroken||kunBroken){
        const combined=[w.reading,w.on_reading,w.kun_reading].filter(Boolean).join('・');
        const{on_reading,kun_reading}=splitOnKun(combined);
        w.on_reading=on_reading||'';
        w.kun_reading=kun_reading||'';
        delete w.reading;
      }
    }
    if(!w.kanji&&w.reading)w.kanji=w.reading.split(',')[0].trim();
    if(w.kanji)words.push(w);
  }
  if(!words.length)throw new Error('Нет записей с полем кандзи');
  // foundFields берём из реальных данных, а не из маппинга
  // (после сплита reading → on_reading+kun_reading маппинг уже не актуален)
  const flds=isKanji?KF:WF;
  const foundFields=flds.filter(f=>words.some(w=>w[f]));
  return{words,headers:foundFields,hasHeaders:true};
}
function defaultMapping(colCount,isKanji=false){
  let d;
  if(isKanji){
    // 3 кол.: kanji / смешанные он+кун / значение  → reading автосплитнется на он/кун
    // 4+ кол.: kanji / он / кун / значение / ...
    // 3 кол.: kanji / смешанные он+кун (мапим в on_reading, потом applyMapping
    //          увидит хирагану в on_reading и автосплитнет на он/кун) / значение
    // 4+ кол.: kanji / он / кун / значение / ...
    d=colCount<=3
      ?['kanji','on_reading','meaning']
      :['kanji','on_reading','kun_reading','meaning','translation','notes'];
  }else{
    d=['kanji','reading','meaning','translation','notes'];
  }
  return Array.from({length:colCount},(_,i)=>d[i]||'');
}

/* ── SM-2 lite ──
 * Per-item progress object:
 *   {reps, lapses, ef, interval, due, lastSeen}
 * Status is derived from reps/interval, not stored, чтобы не рассинхронизировать.
 * quality 0..5 (как в классическом SM-2): <3 — провал; ≥3 — успех.
 *   choice correct  → 4
 *   input  correct  → 5
 *   any    wrong    → 1
 *   mark "знаю"     → 5
 *   mark "учу"      → 3
 *   mark "не знаю"  → 0
 */
const SM={DAY:86400000,KNOW_REPS:3,KNOW_INTERVAL:7,DEFAULT_EF:2.5,MIN_EF:1.3};
function defaultProg(){return{reps:0,lapses:0,ef:SM.DEFAULT_EF,interval:0,due:0,lastSeen:0};}
function getProg(p,id){
  const v=p[id];
  if(!v)return defaultProg();
  if(typeof v==='string'){
    // Legacy migration: status string → object с разумными значениями
    const e=defaultProg();
    if(v==='know'){e.reps=SM.KNOW_REPS;e.interval=SM.KNOW_INTERVAL;e.due=Date.now()+SM.KNOW_INTERVAL*SM.DAY;}
    else if(v==='learning'){e.reps=1;e.lapses=1;e.interval=1;e.due=Date.now()+SM.DAY;}
    return e;
  }
  return{...defaultProg(),...v};
}
function statusOf(p,id){
  const v=p[id];
  if(!v)return'unknown';
  if(typeof v==='string')return v;
  const reps=v.reps||0,lapses=v.lapses||0,interval=v.interval||0;
  if(reps===0&&lapses===0)return'unknown';
  if(reps>=SM.KNOW_REPS&&interval>=SM.KNOW_INTERVAL)return'know';
  return'learning';
}
function smUpdate(p,id,quality){
  const e=getProg(p,id);
  if(quality<3){
    e.reps=0;e.interval=1;e.lapses=(e.lapses||0)+1;
  } else {
    if(e.reps===0)e.interval=1;
    else if(e.reps===1)e.interval=6;
    else e.interval=Math.max(1,Math.round(e.interval*(e.ef||SM.DEFAULT_EF)));
    e.reps=(e.reps||0)+1;
  }
  const ef=(e.ef||SM.DEFAULT_EF)+(0.1-(5-quality)*(0.08+(5-quality)*0.02));
  e.ef=Math.max(SM.MIN_EF,ef);
  e.lastSeen=Date.now();
  e.due=Date.now()+e.interval*SM.DAY;
  p[id]=e;
}
function smOverwrite(p,id,quality){
  // Кнопки в флэшкарте: явный overwrite от пользователя (без накопления reps)
  if(quality>=5){p[id]={reps:SM.KNOW_REPS,lapses:0,ef:SM.DEFAULT_EF,interval:SM.KNOW_INTERVAL,due:Date.now()+SM.KNOW_INTERVAL*SM.DAY,lastSeen:Date.now()};}
  else if(quality>=3){p[id]={reps:1,lapses:0,ef:SM.DEFAULT_EF,interval:1,due:Date.now()+SM.DAY,lastSeen:Date.now()};}
  else {p[id]={reps:0,lapses:1,ef:SM.DEFAULT_EF,interval:0,due:Date.now(),lastSeen:Date.now()};}
}
function dueOf(p,id){const v=p[id];if(!v||typeof v==='string')return 0;return v.due||0;}

/* ── Data helpers ── */
function ds(type){return type==='kanji'?S.kanjiItems:S.words;}
function pr(type){return type==='kanji'?S.kanjiProgress:S.progress;}
function filtered(type,filter,count){
  const p=pr(type);
  let arr=filter==='all'?[...ds(type)]:ds(type).filter(w=>statusOf(p,w.id)===filter);
  // SM-2: для лимита берём сначала просроченные (due<=now), затем добиваем случайными
  if(count&&count!=='all'){
    const n=parseInt(count),now=Date.now();
    const due=shuffle(arr.filter(w=>dueOf(p,w.id)<=now));
    const rest=shuffle(arr.filter(w=>dueOf(p,w.id)>now));
    arr=[...due,...rest].slice(0,n);
  }
  return arr;
}
function shuffle(arr){return[...arr].sort(()=>Math.random()-.5);}
function buildStudyQueue(){
  // Карточки: просроченные первыми, далее по lastSeen (давно не виденные раньше)
  const arr=filtered(S.studyCfg.type,S.studyCfg.filter,S.studyCfg.count);
  const p=pr(S.studyCfg.type),now=Date.now();
  return arr.sort((a,b)=>{
    const da=dueOf(p,a.id),db=dueOf(p,b.id);
    const aDue=da<=now,bDue=db<=now;
    if(aDue!==bDue)return aDue?-1:1;
    return da-db;
  });
}
function buildQuizQ(){
  const{type,mode,answer:af,filter,count}=S.quizCfg;
  const qFields=Array.isArray(S.quizCfg.question)?S.quizCfg.question:[S.quizCfg.question];
  const optN=(mode==='choice4'?4:6);
  const pool=filtered(type,filter,count).filter(w=>w[af]&&qFields.some(f=>w[f]));
  if(pool.length<2)return null;
  const all=ds(type).filter(w=>w[af]);
  if(all.length<optN)return null;
  // SM-2: сначала просроченные (due<=now), внутри тира — случайно.
  // Без random-выбора квиз показывал одну и ту же карточку, т.к. filtered
  // не шафлит при count='all'.
  const now=Date.now(),pp=pr(type);
  const dueP=shuffle(pool.filter(w=>dueOf(pp,w.id)<=now));
  const restP=shuffle(pool.filter(w=>dueOf(pp,w.id)>now));
  const ranked=[...dueP,...restP];
  let qw=null;
  for(const c of ranked){if(qFields.some(f=>c[f])&&c[af]){qw=c;break;}}
  if(!qw)return null;
  // Wrongs must be unique and != correct
  const correctVal=qw[af];
  const wrongPool=[];
  const seen=new Set([correctVal]);
  for(const w of shuffle(all)){
    if(w.id===qw.id)continue;
    if(seen.has(w[af]))continue;
    seen.add(w[af]);
    wrongPool.push(w[af]);
    if(wrongPool.length>=optN-1)break;
  }
  if(wrongPool.length<optN-1)return null;
  const options=shuffle([correctVal,...wrongPool]);
  const mixInput=mode==='mix'?Math.random()<0.5:null;
  return{word:qw,qFields,aField:af,options,correct:options.indexOf(correctVal),mixInput};
}
function buildMatchQ(){
  const{type,filter,count}=S.quizCfg;
  if(type!=='kanji')return null;
  const qFields=Array.isArray(S.quizCfg.question)?S.quizCfg.question:[S.quizCfg.question];
  const qField=qFields[0]||'kanji';
  const otherFields=KF.filter(f=>f!==qField);
  const all=ds(type);
  const pool=filtered(type,filter,count).filter(w=>w[qField]&&otherFields.some(f=>w[f]));
  if(pool.length<2)return null;
  const now=Date.now(),pp=pr(type);
  const dueP=shuffle(pool.filter(w=>dueOf(pp,w.id)<=now));
  const restP=shuffle(pool.filter(w=>dueOf(pp,w.id)>now));
  const qw=[...dueP,...restP][0];
  if(!qw)return null;
  const opts=[];let need=0;
  for(const f of otherFields){
    const correct=qw[f];if(!correct)continue;
    const seen=new Set([correct]);const distractors=[];
    for(const w of shuffle(all)){
      if(w.id===qw.id||!w[f]||seen.has(w[f]))continue;
      seen.add(w[f]);distractors.push(w[f]);
      if(distractors.length>=3)break;
    }
    if(distractors.length<3)continue;
    opts.push({value:correct,field:f,correct:true});
    distractors.forEach(v=>opts.push({value:v,field:f,correct:false}));
    need++;
  }
  if(need<2)return null;
  return{match:true,word:qw,qField,options:shuffle(opts),picks:[],need};
}
function nextQuizQ(){return S.quizCfg.mode==='match'?buildMatchQ():buildQuizQ();}
function checkAns(user,correct){
  const n=s=>s.trim().toLowerCase().replace(/\s+/g,' ');
  const u=n(user);if(!u)return false;
  return correct.split(/[,;、。・\n]/).map(v=>n(v)).filter(Boolean).some(v=>v===u);
}
function bestAF(pref){
  const d=ds(S.quizCfg.type),has=f=>d.some(w=>w[f]);
  if(has(pref))return pref;
  for(const f of['reading','meaning','kanji','on_reading','kun_reading'])
    if(f!==pref&&has(f))return f;
  return pref;
}
function sessionEnd(){
  const p=pr(S.studyCfg.type),res={know:0,learning:0,unknown:0};
  S.studyQueue.forEach(w=>{const s=statusOf(p,w.id);res[s]=(res[s]||0)+1;});
  S.studyResults=res;
}

/* ── Card Variant Builder (Figma 31:112 / 33:235) ── */
function renderKun(s){
  if(!s)return'';
  const tokens=String(s).split(/[、・,]/).map(t=>t.trim()).filter(Boolean);
  return tokens.map(t=>{
    const i=t.indexOf('.');
    const inner=i<0?esc(t):esc(t.slice(0,i))+`<span style="color:#636363">${esc(t.slice(i+1))}</span>`;
    return`<span style="display:inline-block;white-space:nowrap">${inner}</span>`;
  }).join(', ');
}
function cvReadRow(label,value,raw){
  return`<div class="cv-rread"><div class="cv-rl">${label}:</div><div class="cv-rv">${raw?value:esc(value)}</div></div>`;
}
function cvMeaningsBlock(word,showFields){
  const has=f=>showFields.includes(f)&&word[f];
  const g=[];
  ['meaning','translation'].forEach(f=>{
    if(has(f))word[f].split(/;/).forEach(s=>{const t=s.trim();if(t)g.push(t);});
  });
  if(!g.length)return'';
  return`<div class="cv-meanings">${g.slice(0,7).map((s,i)=>`<div class="cv-mn"><span class="cv-mi">${i+1}.</span><span class="cv-mt">${esc(s)}</span></div>`).join('')}</div>`;
}
function buildCardVariant(word,showFields,dataType){
  if(!word||!showFields||!showFields.length)return'<div style="color:var(--t2);text-align:center">—</div>';
  const has=f=>showFields.includes(f)&&word[f];
  const isKanjiType=dataType==='kanji';
  const mHtml=cvMeaningsBlock(word,showFields);

  // Build readings (right side of top row)
  const reads=[];
  if(isKanjiType){
    let onR=word.on_reading,kunR=word.kun_reading;
    if((!onR||!kunR)&&word.reading){
      const sp=splitOnKun([word.reading,onR,kunR].filter(Boolean).join('・'));
      onR=onR||sp.on_reading;kunR=kunR||sp.kun_reading;
    }
    if(showFields.includes('on_reading')&&onR)reads.push(cvReadRow('on',onR));
    if(showFields.includes('kun_reading')&&kunR)reads.push(cvReadRow('kun',renderKun(kunR),true));
  }else{
    if(has('reading'))reads.push(cvReadRow('kana',word.reading));
  }
  const readsHtml=reads.length?`<div class="cv-readings">${reads.join('')}</div>`:'';

  // Top row: main char + readings (if either exists)
  const mainHtml=has('kanji')?`<div class="cv-main">${esc(word.kanji)}</div>`:'';
  let topHtml='';
  if(mainHtml||readsHtml){
    topHtml=`<div class="cv-top">${mainHtml}${readsHtml}</div>`;
  }

  if(!topHtml&&!mHtml){
    if(has('notes'))return`<div class="cv-root"><div style="font-size:12px;color:var(--t2);font-style:italic">${esc(word.notes)}</div></div>`;
    return'<div style="color:var(--t2);text-align:center">—</div>';
  }
  return`<div class="cv-root">${topHtml}${mHtml}</div>`;
}

/* ── Card Front Builder ── */
function buildCardFront(word,frontField,dataType){
  const isKanjiType=dataType==='kanji';
  const val=word[frontField]||'—';
  if(frontField==='kanji'){
    return isKanjiType
      ?`<div class="fc-kanji">${esc(val)}</div>`
      :`<div class="fc-main">${esc(val)}</div>`;
  }
  if(frontField==='on_reading'){
    return`<div class="fc-lbl">on</div><div class="cv-kana-lg">${esc(val)}</div>`;
  }
  if(frontField==='kun_reading'){
    return`<div class="fc-lbl">kun</div><div class="cv-kana-lg">${renderKun(val)}</div>`;
  }
  if(frontField==='reading'){
    return`<div class="cv-kana-lg">${esc(val)}</div>`;
  }
  if(frontField==='meaning'||frontField==='translation'){
    const g=[];val.split(/;/).forEach(s=>{const t=s.trim();if(t)g.push(t);});
    if(g.length)return`<div class="fc-lbl">Значение</div><div class="cv-meanings">${
      g.slice(0,4).map((s,i)=>`<div class="cv-mn"><span class="cv-mi">${i+1}.</span><span class="cv-mt">${esc(s)}</span></div>`).join('')
    }</div>`;
  }
  return`<div class="fc-lbl">${fldLabel(frontField,dataType)}</div><div class="fc-main sm">${esc(val)}</div>`;
}

  </div>`;
  const qCard=`<div class="quiz-q">${buildCardVariant(q.word,[q.qField],S.quizCfg.type)}</div>`;
  const picks=q.picks||[];
  const revealed=q.revealed||[];
  const fStatus=q.fieldStatus||{};
  const optsHtml=q.options.map((o,i)=>{
    const picked=picks.includes(i);
    const isRevealed=revealed.includes(i);
    let cls='';
    if(S.quizDone){
      if(o.correct)cls='ok';
      else if(picked)cls='bad';
    } else if(picked){
      cls=o.correct?'ok':'bad';
    } else if(isRevealed){
      cls='ok';
    }
    const lockedField=fStatus[o.field]&&!picked&&!isRevealed;
    const dis=picked||isRevealed||lockedField||S.quizDone?'disabled':'';
    const txt=o.field==='kun_reading'?renderKun(o.value):esc(o.value);
    return`<button class="qopt ${cls}" ${dis} data-a="match-pick:${i}">${txt}</button>`;
  }).join('');
  const lbl=`Выберите ${q.need} правильных (${picks.length}/${q.need})`;
  const panel=`<div class="quiz-panel"><div class="quiz-panel-lbl">${lbl}</div><div class="quiz-opts">${optsHtml}</div></div>`;
  const actions=`<div class="quiz-actions">
    <button class="qact-btn" data-a="stop-quiz">Стоп</button>
    <button class="qact-btn" data-a="skip-q">Пропустить</button>
  </div>`;
  const nextBtn=S.quizDone?`<button class="next-btn" data-a="next-q">Следующий →</button>`:'';
  return`<div class="pg">${scoreBar}${qCard}${panel}${actions}${nextBtn}</div>`;
}

/* ── Actions ── */
function act(action){
  const ci=action.indexOf(':');
  const type=ci>-1?action.slice(0,ci):action;
  const val=ci>-1?action.slice(ci+1):'';

  switch(type){
    case'tab':
      S.tab=val;S.confirmPending=null;
      if(val!=='tests'){S.studyQueue=[];S.studyResults=null;S.quizQ=null;S.quizDone=false;}
      break;
    case'home-tab':   S.homeTab=val;break;
    case'words-tab':  S.wordsTab=val;S.wordsSearch='';break;
    case'tests-sub':  S.testsSubTab=val;break;
    case'words-search-toggle': document.getElementById('words-search')?.focus(); return;

    case'go-cards':
      S.tab='tests';S.testsSubTab='cards';S.studyCfg.type=S.homeTab;S.studyQueue=[];S.studyResults=null;break;
    case'go-quiz':
      S.tab='tests';S.testsSubTab='quiz';S.quizCfg.type=S.homeTab;S.quizQ=null;S.quizDone=false;break;
    case'go-import-home':
      S.screen='import';S.importType=S.homeTab;S.importStep='type';S.importPreview=null;S.importErr=null;S.importRaw=null;break;
    case'words-import':
      S.screen='import';S.importType=S.wordsTab;S.importStep='type';S.importPreview=null;S.importErr=null;S.importRaw=null;break;

    case'import-type':
      S.importType=val;
      // Если уже в шаге маппинга — обновить дефолтные подписи колонок
      if(S.importRaw)S.importMapping=defaultMapping(S.importRaw.colCount,val==='kanji');
      break;
    case'back-import':
      if(S.importStep==='map'){S.importStep='type';S.importRaw=null;S.importMapping=[];}
      else if(S.importStep==='preview'){S.importStep=S.importRaw?'map':'type';S.importPreview=null;}
      else{S.screen='main';S.importStep='type';S.importPreview=null;S.importErr=null;S.importRaw=null;}
      break;
    case'cancel-import':S.importPreview=null;S.importStep=S.importRaw?'map':'type';break;
    case'apply-map':{
      if(!S.importRaw)break;
      const mapping=Array.from({length:S.importRaw.colCount},(_,i)=>{
        const el=document.getElementById(`map-col-${i}`);return el?el.value:(S.importMapping[i]||'');
      });
      if(!mapping.includes('kanji')&&!mapping.includes('reading')){toast('Назначьте колонку кандзи или чтения');return;}
      try{S.importPreview=applyMapping(S.importRaw.rawRows,mapping,S.importType==='kanji');S.importStep='preview';S.importErr=null;}
      catch(e){S.importErr=e.message;}
      break;
    }
    case'confirm-import':
      if(S.importPreview){
        const nw=S.importPreview.words;
        if(S.importType==='kanji'){
          // Страховочный проход: если reading не был разбит на on/kun — делаем это сейчас
          nw.forEach(w=>{
            if(w.reading&&!w.on_reading&&!w.kun_reading){
              const{on_reading,kun_reading}=splitOnKun(w.reading);
              if(on_reading)w.on_reading=on_reading;
              if(kun_reading)w.kun_reading=kun_reading;
              delete w.reading;
            }
          });
          const ex={};S.kanjiItems.forEach(w=>{ex[w.kanji]=w;});
          nw.forEach(w=>{const o=ex[w.kanji];if(o&&S.kanjiProgress[o.id]){S.kanjiProgress[w.id]=S.kanjiProgress[o.id];delete S.kanjiProgress[o.id];}});
          const ns=new Set(nw.map(w=>w.kanji));S.kanjiItems=[...S.kanjiItems.filter(w=>!ns.has(w.kanji)),...nw];
        } else {
          const ex={};S.words.forEach(w=>{ex[w.kanji]=w;});
          nw.forEach(w=>{const o=ex[w.kanji];if(o&&S.progress[o.id]){S.progress[w.id]=S.progress[o.id];delete S.progress[o.id];}});
          const ns=new Set(nw.map(w=>w.kanji));S.words=[...S.words.filter(w=>!ns.has(w.kanji)),...nw];
        }
        if(S.importType==='kanji')S.kanjiCsv=S.importRawText||'';
        else S.wordsCsv=S.importRawText||'';
        S.importRawText='';
        S.importPreview=null;S.importRaw=null;S.importStep='type';S.screen='main';
        save();toast(`Импортировано ${nw.length} записей`);
      }
      break;

    case'study-type':
      S.studyCfg.type=val;S.studyCfg.front=['kanji'];
      S.studyCfg.back=val==='kanji'?['on_reading','kun_reading','meaning']:['reading','meaning'];break;
    case'study-front':S.studyCfg.front=val;break;
    case'study-filter':S.studyCfg.filter=val;break;
    case'study-count':S.studyCfg.count=val;break;
    case'start-study':
      S.studyQueue=buildStudyQueue();
      if(!S.studyQueue.length){toast('Нет карточек для этого фильтра');return;}
      S.studyIdx=0;S.cardFlipped=false;S.studyResults=null;break;
    case'flip':S.cardFlipped=!S.cardFlipped;haptic('light');break;
    case'mark':{
      const w=S.studyQueue[S.studyIdx];
      if(w){
        const q=val==='know'?5:val==='learning'?3:0;
        smOverwrite(pr(S.studyCfg.type),w.id,q);
        save();haptic();S.studyIdx++;S.cardFlipped=false;
        if(S.studyIdx>=S.studyQueue.length)sessionEnd();
      }
      break;}
    case'skip-card':
      S.studyIdx++;S.cardFlipped=false;
      if(S.studyIdx>=S.studyQueue.length)sessionEnd();break;
    case'stop-study':
      S.studyQueue=[];S.studyResults=null;S.tab='tests';S.testsSubTab='cards';break;
    case'restart-study':
      S.studyQueue=buildStudyQueue();S.studyIdx=0;S.cardFlipped=false;S.studyResults=null;break;

    case'quiz-type':
      S.quizCfg.type=val;
      S.quizCfg.question=val==='kanji'?['kanji']:['kanji'];
      S.quizCfg.answer=val==='kanji'?'on_reading':'reading';break;
    case'quiz-mode':
      S.quizCfg.mode=val;
      if(val==='match'&&S.quizCfg.question.length>1)S.quizCfg.question=[S.quizCfg.question[0]];
      break;
    case'quiz-afield':S.quizCfg.answer=val;break;
    case'quiz-filter':S.quizCfg.filter=val;break;
    case'quiz-count':S.quizCfg.count=val;break;
    case'start-quiz':{
      const af=S.quizCfg.answer;
      const d=ds(S.quizCfg.type);
      if(S.quizCfg.mode!=='match'&&!d.some(w=>w[af])){toast(`Поле "${fldShort(af,S.quizCfg.type)}" пустое во всех записях`);break;}
      S.quizScore={ok:0,bad:0};S.quizQ=nextQuizQ();S.quizDone=false;S.quizSel=-1;S.quizInputVal='';
      if(!S.quizQ)toast('Недостаточно данных (нужно ≥4 с заполненными полями)');
      break;}
    case'quiz-check':{
      if(!S.quizDone&&S.quizQ){
        const inp=document.getElementById('quiz-input');
        S.quizInputVal=inp?inp.value:'';S.quizDone=true;
        const ok=checkAns(S.quizInputVal,S.quizQ.options[S.quizQ.correct]);
        const w=S.quizQ.word,p=pr(S.quizCfg.type);
        smUpdate(p,w.id,ok?5:1);
        if(ok){S.quizScore.ok++;haptic('light');}
        else{S.quizScore.bad++;haptic('medium');}
        save();
      }
      break;}
    case'match-pick':{
      if(!S.quizQ||!S.quizQ.match||S.quizDone)break;
      const i=+val;const q=S.quizQ;const o=q.options[i];
      q.fieldStatus=q.fieldStatus||{};
      q.revealed=q.revealed||[];
      if(q.fieldStatus[o.field]||q.picks.includes(i))break;
      q.picks.push(i);
      q.fieldStatus[o.field]=o.correct?'right':'wrong';
      if(!o.correct){
        const ci=q.options.findIndex(x=>x.field===o.field&&x.correct);
        if(ci>=0&&!q.revealed.includes(ci))q.revealed.push(ci);
      }
      haptic(o.correct?'light':'medium');
      if(Object.keys(q.fieldStatus).length>=q.need){
        const wrong=Object.values(q.fieldStatus).filter(s=>s==='wrong').length;
        const quality=wrong===0?5:wrong===1?3:1;
        const w=q.word,p=pr(S.quizCfg.type);
        smUpdate(p,w.id,quality);
        if(wrong===0)S.quizScore.ok++;else S.quizScore.bad++;
        S.quizDone=true;save();
      }
      break;}
    case'quiz-ans':{
      if(!S.quizDone&&S.quizQ){
        const idx=parseInt(val);S.quizSel=idx;S.quizDone=true;
        const ok=idx===S.quizQ.correct;
        const w=S.quizQ.word,p=pr(S.quizCfg.type);
        smUpdate(p,w.id,ok?4:1);
        if(ok){S.quizScore.ok++;haptic('light');}
        else{S.quizScore.bad++;haptic('medium');}
        save();
      }
      break;}
    case'next-q':
      S.quizQ=nextQuizQ();S.quizDone=false;S.quizSel=-1;S.quizInputVal='';
      if(!S.quizQ)toast('Нет вопросов — проверьте фильтр');break;
    case'skip-q':
      // Пропуск без оценки — просто следующий вопрос
      S.quizQ=nextQuizQ();S.quizDone=false;S.quizSel=-1;S.quizInputVal='';
      if(!S.quizQ)toast('Нет вопросов — проверьте фильтр');break;
    case'stop-quiz':
      S.quizQ=null;S.quizDone=false;S.quizInputVal='';
      S.quizScore={ok:0,bad:0};S.quizSel=-1;
      S.tab='tests';S.testsSubTab='quiz';break;

    case'download-csv':{
      const csv=val==='kanji'?S.kanjiCsv:S.wordsCsv;
      if(!csv){toast('CSV не сохранён');return;}
      const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=val==='kanji'?'kanji.csv':'words.csv';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      URL.revokeObjectURL(url);
      return;}
    case'reset-progress':S.confirmPending='reset-progress';break;
    case'clear-words':   S.confirmPending='clear-words';break;
    case'confirm-no':    S.confirmPending=null;break;
    case'confirm-yes':
      if(S.confirmPending==='reset-progress'){
        S.progress={};S.kanjiProgress={};save();toast('Прогресс сброшен');
      } else if(S.confirmPending==='clear-words'){
        S.words=[];S.progress={};S.kanjiItems=[];S.kanjiProgress={};
        S.wordsCsv='';S.kanjiCsv='';
        S.studyQueue=[];S.quizQ=null;save();toast('Данные удалены');
      }
      S.confirmPending=null;break;
  }
  render();
}

/* ── Events ── */
function setupDelegation(){
  document.addEventListener('click',e=>{
    const el=e.target.closest('[data-a]');if(el)act(el.dataset.a);
  });
  document.addEventListener('keydown',e=>{
    if(e.key!=='Enter')return;
    if(!S.quizQ)return;
    const qi=document.getElementById('quiz-input');
    if(qi&&document.activeElement===qi){
      e.preventDefault();
      act(S.quizDone?'next-q':'quiz-check');
    } else if(S.quizDone){
      // После ответа Enter где угодно — следующий
      e.preventDefault();act('next-q');
    }
  });
}
function bindAll(){
  // Front-chips toggle (study, multi-select)
  const cf=document.getElementById('chips-front');
  if(cf)cf.addEventListener('click',e=>{
    const chip=e.target.closest('[data-field-front]');if(!chip)return;
    const f=chip.dataset.fieldFront,i=S.studyCfg.front.indexOf(f);
    if(i>=0)S.studyCfg.front=S.studyCfg.front.filter(x=>x!==f);
    else S.studyCfg.front=[...S.studyCfg.front,f];
    chip.classList.toggle('on',S.studyCfg.front.includes(f));
  });
  // Back-chips toggle (study)
  const cb=document.getElementById('chips-back');
  if(cb)cb.addEventListener('click',e=>{
    const chip=e.target.closest('[data-field]');if(!chip)return;
    const f=chip.dataset.field,i=S.studyCfg.back.indexOf(f);
    if(i>=0)S.studyCfg.back=S.studyCfg.back.filter(x=>x!==f);
    else S.studyCfg.back=[...S.studyCfg.back,f];
    chip.classList.toggle('on');
  });
  // Question-chips toggle (quiz, multi-select)
  const cq=document.getElementById('chips-q');
  if(cq)cq.addEventListener('click',e=>{
    const chip=e.target.closest('[data-qfield]');if(!chip)return;
    const f=chip.dataset.qfield;
    if(S.quizCfg.mode==='match'){S.quizCfg.question=[f];render();return;}
    const i=S.quizCfg.question.indexOf(f);
    if(i>=0){if(S.quizCfg.question.length>1)S.quizCfg.question=S.quizCfg.question.filter(x=>x!==f);}
    else S.quizCfg.question=[...S.quizCfg.question,f];
    chip.classList.toggle('on',S.quizCfg.question.includes(f));
  });
  // Word search
  const ws=document.getElementById('words-search');
  if(ws){
    ws.addEventListener('input',e=>{S.wordsSearch=e.target.value;render();});
  }
  // File drop
  const dz=document.getElementById('dropzone'),fin=document.getElementById('file-in');
  if(dz&&fin){
    dz.onclick=()=>fin.click();
    fin.onchange=e=>{const f=e.target.files[0];if(f)readFile(f);};
    dz.ondragover=e=>{e.preventDefault();dz.classList.add('over');};
    dz.ondragleave=()=>dz.classList.remove('over');
    dz.ondrop=e=>{e.preventDefault();dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f)readFile(f);};
  }
  // Quiz input focus — только при первом маунте текущего вопроса,
  // чтобы не переуводить курсор при каждом re-render во время взаимодействия
  const qi=document.getElementById('quiz-input');
  if(qi&&!S.quizDone){
    const qid=S.quizQ&&S.quizQ.word?S.quizQ.word.id:null;
    if(qid&&S._quizFocusedFor!==qid){
      S._quizFocusedFor=qid;
      setTimeout(()=>qi.focus(),50);
    }
  } else if(S.quizDone){
    // Сброс маркера, чтобы следующий вопрос снова получил фокус
    S._quizFocusedFor=null;
  }
}
function readFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const text=e.target.result;
      S.importRawText=text;
      const r=parseFile(text);
      if(!r.hasHeaders){S.importRaw=r;S.importMapping=defaultMapping(r.colCount,S.importType==='kanji');S.importStep='map';S.importPreview=null;S.importErr=null;}
      else{S.importPreview=r;S.importStep='preview';S.importRaw=null;S.importErr=null;}
    }catch(err){S.importErr=err.message;S.importPreview=null;S.importRaw=null;S.importStep='type';}
    render();
  };
  reader.readAsText(file,'UTF-8');
}

/* ── Boot ── */
load();
setupDelegation();
render();
</script>
