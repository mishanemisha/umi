<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>日本語</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;
  --c:#1c1c1c;        /* card surface */
  --c2:#272727;       /* darker surface / progress bg */
  --nav:#161616;      /* tab bar bg */
  --a:#8384c7;        /* accent */
  --al:#868fbe;       /* accent-light / section labels */
  --t:#fff;           /* text */
  --t2:#868fbe;       /* secondary text */
  --ic:#434343;       /* inactive icon */
  --g:#7aff78;        /* green / знаю */
  --y:#fff285;        /* yellow / учу */
  --r:#ff3c3c;        /* red / не знаю */
}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;padding-bottom:110px;min-height:100vh}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pg{animation:up .16s ease;padding:0 16px}

/* ─── Tab bar ─── */
.bnav{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  width:calc(100% - 24px);max-width:456px;
  background:var(--nav);border-radius:300px;
  display:flex;align-items:center;justify-content:space-around;
  padding:10px 8px;z-index:200;
}
.bnav-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:none;border:none;cursor:pointer;
  color:var(--ic);font-size:11px;font-weight:500;
  padding:4px 12px;border-radius:300px;transition:color .15s;
  min-width:52px;
}
.bnav-btn.active{color:var(--a)}
.bnav-icon{
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
}
.bnav-icon svg{width:28px;height:28px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* ─── top_icon ─── */
.top-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--a);line-height:1;flex-shrink:0}

/* ─── Page header ─── */
.phdr{padding:16px 16px 8px;display:flex;align-items:center;gap:12px}
.phdr-title{font-size:20px;font-weight:700;flex:1}
.phdr-back{background:var(--c);border:none;color:var(--t);font-size:13px;cursor:pointer;padding:7px 14px;border-radius:300px}

/* ─── Type tabs (Слова | Кандзи) ─── */
.ttabs{display:flex;gap:8px;padding:4px 16px 12px}
.ttab{padding:7px 16px;border-radius:300px;border:none;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;background:var(--c);color:var(--t)}
.ttab.on{background:var(--a);color:#fff}

/* ─── Stats row ─── */
.stats{display:flex;gap:8px;padding:0 16px 12px}
.sbox{flex:1;background:var(--c);border-radius:16px;padding:14px 10px;text-align:center}
.snum{font-size:36px;font-weight:400;line-height:1}
.slbl{font-size:12px;color:var(--t);margin-top:4px}
.sbox.g .snum{color:var(--g)}
.sbox.y .snum{color:var(--y)}
.sbox.r .snum{color:var(--r)}

/* ─── Progress card ─── */
.prog-card{margin:0 16px 12px;background:var(--c);border-radius:16px;padding:14px 16px}
.prog-bar-wrap{height:6px;background:var(--c2);border-radius:300px;overflow:hidden;margin-bottom:8px}
.prog-bar{height:100%;background:var(--al);border-radius:300px;transition:width .4s}
.prog-info{display:flex;justify-content:space-between;font-size:12px;color:var(--al)}

/* ─── Action grid (Главная) ─── */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 12px}
.act-btn{background:var(--c);border:none;color:var(--t);border-radius:16px;padding:14px;cursor:pointer;text-align:left;transition:background .15s;min-height:58px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500}
.act-btn:active{background:var(--c2)}
.act-btn.primary{background:var(--a)}
.act-btn.primary:active{background:#7374b5}

/* ─── Config card ─── */
.cfg-card{background:var(--c);border-radius:16px;padding:14px 16px;margin:0 16px 8px}
.cfg-lbl{font-size:12px;color:var(--al);margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 12px;height:27px;border-radius:16px;border:none;font-size:12px;cursor:pointer;background:var(--c2);color:var(--t);transition:all .15s;font-weight:400;display:flex;align-items:center}
.chip.on{background:var(--a);color:#fff}
/* side-by-side config (filter + count) */
.cfg-row{display:flex;gap:8px;padding:0 16px 8px}
.cfg-row .cfg-card{flex:1;margin:0}

/* ─── Start button ─── */
.start-row{padding:8px 16px 0;display:flex;justify-content:flex-end}
.start-btn{background:var(--a);border:none;color:#fff;border-radius:16px;padding:7px 24px;font-size:13px;cursor:pointer;transition:opacity .15s}
.start-btn:active{opacity:.8}

/* ─── Full-width button ─── */
.btn{display:flex;align-items:center;justify-content:center;padding:14px;border-radius:300px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;width:100%}
.btn:active{opacity:.75}
.btn-p{background:var(--a);color:#fff}
.btn-s{background:var(--c);color:var(--t)}
.btn-d{background:rgba(255,60,60,.15);color:var(--r)}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn-row .btn{flex:1}

/* ─── Flashcard ─── */
.fc-counter{font-size:18px;text-align:center;padding:8px 16px 12px}
.fc-wrap{perspective:1000px;height:260px;margin:0 16px 14px;cursor:pointer}
.fc{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;background:var(--c);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}
.fc-back{transform:rotateY(180deg);background:var(--c2)}
.fc-sbar{position:absolute;top:0;left:0;right:0;height:4px;border-radius:16px 16px 0 0}
.fc-sbar.g{background:var(--g)}.fc-sbar.y{background:var(--y)}.fc-sbar.r{background:var(--c2)}
/* Kanji card face */
.fc-kanji{font-size:76px;font-weight:400;color:var(--a);line-height:1}
.fc-kana{font-size:36px;font-weight:400;color:var(--a);line-height:1;margin-top:4px}
.fc-meanings{margin-top:12px;text-align:center}
.fc-mn{font-size:12px;color:var(--t);line-height:1.6}
.fc-tap{font-size:12px;color:var(--t2);margin-top:12px}
/* Word card face (non-kanji) */
.fc-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--t2);margin-bottom:8px}
.fc-main{font-size:60px;line-height:1;color:var(--t);text-align:center}
.fc-main.sm{font-size:22px}
/* Back side rows */
.fc-back-body{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
/* On/kun label (legacy, kept for compat) */
.fc-onkun{display:flex;flex-direction:column;gap:4px;align-items:center;margin-top:6px}
.fc-okrow{font-size:12px;color:var(--t)}
.fc-okrow span{color:var(--a);font-size:16px;margin-left:4px}

/* ─── Card Variant System ─── */
/* Shared wrapper */
.cv-root{width:100%;display:flex;flex-direction:column;align-items:center;gap:8px}
/* Kanji variant */
.cv-kanji-main{display:flex;align-items:flex-start;justify-content:center;gap:18px;width:100%}
.cv-kanji-char{font-size:68px;color:var(--t);line-height:1;font-weight:300;flex-shrink:0}
.cv-readings{display:flex;flex-direction:column;gap:6px;justify-content:center;padding-top:10px}
.cv-rrow{display:flex;align-items:baseline;gap:6px}
.cv-rl{font-size:11px;color:var(--t2);font-weight:600;letter-spacing:.05em;min-width:14px;text-align:right}
.cv-rv{font-size:17px;color:var(--a);line-height:1.3;word-break:break-word}
/* Readings-only variant */
.cv-rrow-lg{display:flex;align-items:baseline;gap:10px}
.cv-rv-lg{font-size:26px;color:var(--a);line-height:1.3}
/* Word variant */
.cv-word{font-size:52px;color:var(--t);line-height:1;font-weight:300}
.cv-kana{font-size:20px;color:var(--a);margin-top:2px}
/* Single reading (front or back) */
.cv-kana-lg{font-size:36px;color:var(--a);line-height:1}
/* Separator */
.cv-sep{width:56px;height:1px;background:rgba(255,255,255,.12);margin:6px 0}
/* Meanings list */
.cv-meanings{width:100%;text-align:left;padding:0 2px}
.cv-mn{font-size:12px;color:var(--t);line-height:1.9;display:flex;gap:6px;align-items:baseline}
.cv-mi{color:var(--t2);font-size:10px;min-width:14px;text-align:right;flex-shrink:0}

/* ─── Mark buttons ─── */
.mark-row{display:flex;gap:8px;padding:0 16px;margin-bottom:8px}
.mbtn{flex:1;height:36px;border-radius:300px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:500;transition:opacity .15s}
.mbtn:active{opacity:.7}
.mbtn.r{background:rgba(255,60,60,.15);color:var(--r)}
.mbtn.y{background:rgba(255,242,133,.15);color:var(--y)}
.mbtn.g{background:rgba(122,255,120,.15);color:var(--g)}

/* ─── Stop/Skip row ─── */
.stop-row{display:flex;gap:8px;padding:0 16px}
.stop-btn{flex:1;height:27px;background:var(--c);border:none;color:var(--t);border-radius:16px;font-size:12px;cursor:pointer;transition:opacity .15s}
.stop-btn:active{opacity:.7}

/* ─── Quiz score bar ─── */
.qscore{display:flex;align-items:center;gap:10px;padding:0 16px;margin-bottom:12px}
.qscore-item{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:500}
.qscore-bad{color:var(--t)}
.qscore-ok{color:var(--t)}
.qscore-total{color:var(--t);margin-right:auto}
.qscore .stop-btn{margin-left:auto;width:auto;flex:none;padding:0 14px}

/* ─── Quiz question card ─── */
.quiz-q{background:var(--c);border-radius:16px;padding:20px;margin:0 16px 12px;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center}
.quiz-ql{font-size:12px;color:var(--al)}
.quiz-qm{font-size:52px;line-height:1}
.quiz-qm.sm{font-size:20px}
.quiz-qh{font-size:14px;color:var(--t2)}

/* ─── Quiz options grid (3×2) ─── */
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:0 16px;margin-bottom:10px}
.qopt{background:var(--c);border:none;color:var(--t);border-radius:4px;padding:0 8px;height:27px;font-size:13px;cursor:pointer;transition:background .15s;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qopt.sel{background:var(--a);color:#fff}
.qopt.ok{background:rgba(122,255,120,.25);color:var(--g)}
.qopt.bad{background:rgba(255,60,60,.2);color:var(--r)}
.qopt:disabled{cursor:default}

/* ─── Quiz input ─── */
.quiz-inp-wrap{background:var(--c);border-radius:16px;padding:10px 16px;margin:0 16px 10px}
.quiz-inp-lbl{font-size:12px;color:var(--al);margin-bottom:8px}
.quiz-inp{width:100%;background:var(--c2);border:none;border-radius:4px;color:var(--t);font-size:15px;padding:5px 10px;height:27px;outline:none;font-family:inherit;text-align:center;transition:box-shadow .15s}
.quiz-inp:focus{box-shadow:0 0 0 2px var(--a)}
.quiz-inp.ok{box-shadow:0 0 0 2px var(--g)}
.quiz-inp.bad{box-shadow:0 0 0 2px var(--r)}
.quiz-inp:disabled{opacity:.8;cursor:default}
.quiz-result{font-size:13px;margin-top:8px;text-align:center}
.quiz-result.ok{color:var(--g)}
.quiz-result.bad{color:var(--r)}

/* ─── Next button (quiz) ─── */
.next-btn{margin:0 16px 10px;background:var(--a);border:none;color:#fff;border-radius:16px;padding:10px;font-size:13px;font-weight:500;width:calc(100% - 32px);cursor:pointer;transition:opacity .15s}
.next-btn:active{opacity:.8}

/* ─── Words list ─── */
.wfilter{display:flex;gap:6px;padding:0 16px 10px;align-items:center}
.wf-tab{padding:7px 14px;border-radius:300px;border:none;font-size:12px;background:var(--c);color:var(--t);cursor:pointer}
.wf-tab.on{background:var(--a);color:#fff}
.wf-import{padding:7px 12px;border-radius:4px;border:none;font-size:12px;background:var(--c);color:var(--t);cursor:pointer;display:flex;align-items:center;gap:5px;margin-left:auto}
.wf-search{padding:7px 12px;border-radius:4px;border:none;font-size:12px;background:var(--c);color:var(--t);cursor:pointer;display:flex;align-items:center;gap:5px}
.wsearch-wrap{padding:0 16px 10px;position:relative}
.wsearch{width:100%;background:var(--c);border:none;border-radius:300px;color:var(--t);font-size:13px;padding:9px 16px 9px 36px;outline:none;font-family:inherit}
.wsearch::placeholder{color:var(--t2)}
.wsearch-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.wlist{background:var(--c);border-radius:16px;margin:0 16px 10px;overflow:hidden}
.witem{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.05);gap:12px}
.witem:last-child{border-bottom:none}
.wkanji{font-size:24px;min-width:40px;text-align:center}
.winfo{flex:1;min-width:0}
.wreading{font-size:12px;color:var(--al)}
.wtrans{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wdot{width:9px;height:9px;border-radius:50%;background:var(--c2);flex-shrink:0}
.wdot.g{background:var(--g)}.wdot.y{background:var(--y)}.wdot.r{background:var(--r)}
.wok{font-size:11px;color:var(--al)}

/* ─── Settings ─── */
.sset{background:var(--c);border-radius:16px;overflow:hidden;margin:0 16px 12px}
.sset-lbl{font-size:12px;color:var(--al);padding:0 16px;margin-bottom:6px}
.srow{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}
.srow:last-child{border-bottom:none}
.srow-l{flex:1;font-size:14px}
.srow-r{font-size:13px;color:var(--al)}
.confirm-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05);gap:8px}
.confirm-row:last-child{border-bottom:none}
.confirm-text{flex:1;font-size:13px}
.confirm-no,.confirm-yes{border:none;border-radius:300px;padding:6px 16px;font-size:12px;cursor:pointer}
.confirm-no{background:var(--c2);color:var(--t)}
.confirm-yes{background:rgba(255,60,60,.15);color:var(--r)}

/* ─── Import ─── */
.dropzone{border:2px dashed var(--c2);border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin:0 16px 10px}
.dropzone.over{border-color:var(--a);background:rgba(131,132,199,.07)}
.dz-icon{font-size:36px;margin-bottom:8px}
.dz-text{font-size:14px;font-weight:500;color:var(--t)}
.dz-hint{font-size:12px;color:var(--t2);margin-top:4px}
.tbl-wrap{overflow-x:auto;border-radius:12px;overflow:hidden;margin:0 16px 10px}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--c)}
th{background:var(--c2);padding:8px 10px;text-align:left;font-weight:600;color:var(--al);font-size:11px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
td{padding:7px 10px;border-top:1px solid rgba(255,255,255,.05);white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis}

/* ─── Empty ─── */
.empty{text-align:center;padding:60px 20px;color:var(--t2)}
.ei{font-size:56px;margin-bottom:14px}
.et{font-size:18px;font-weight:700;color:var(--t);margin-bottom:6px}
.eb{font-size:13px;margin-bottom:20px}

/* ─── Done ─── */
.done{text-align:center;padding:40px 16px}
.done-i{font-size:56px;margin-bottom:12px}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.rc{border-radius:16px;padding:14px;text-align:center}
.rc.g{background:rgba(122,255,120,.12);color:var(--g)}
.rc.y{background:rgba(255,242,133,.12);color:var(--y)}
.rc.r{background:rgba(255,60,60,.12);color:var(--r)}
.rn{font-size:32px;font-weight:700}.rl{font-size:12px;margin-top:3px;opacity:.8}

/* ─── Sub-tabs (Карточки / Квиз) ─── */
.sub-tabs{display:flex;background:var(--c);border-radius:300px;padding:4px;gap:4px;margin:0 16px 14px}
.stab{flex:1;padding:8px;border-radius:300px;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;background:none;color:var(--t2)}
.stab.on{background:var(--c2);color:var(--t)}

/* ─── Toast ─── */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--c2);border-radius:12px;padding:9px 18px;font-size:13px;z-index:300;transition:transform .2s;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ─── Error box ─── */
.err-box{background:rgba(255,60,60,.1);border:1px solid var(--r);border-radius:12px;padding:11px 14px;color:var(--r);font-size:13px;margin:0 16px 10px}

/* ─── Mono ─── */
.mono{font-family:'SFMono-Regular',Consolas,monospace;font-size:12px;color:var(--al);line-height:1.7}
</style>
</head>

<div id="app"></div>
<div id="toast"></div>

const FK=Object.keys(FIELDS);
const WF=['kanji','reading','meaning','translation','notes'];
const KF=['kanji','on_reading','kun_reading','meaning','translation','notes'];

/* ── Persist ── */
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('jl4')||'{}');
    S.words=d.words||[]; S.progress=d.progress||{};
    S.kanjiItems=d.kanjiItems||[]; S.kanjiProgress=d.kanjiProgress||{};
    S.studyCfg={...S.studyCfg,...(d.studyCfg||{})};
    S.quizCfg={...S.quizCfg,...(d.quizCfg||{})};
    if(typeof S.quizCfg.question==='string')S.quizCfg.question=[S.quizCfg.question];
    // Миграция: исправляем кандзи с неспличенными on/kun чтениями
    let migrated=false;
    S.kanjiItems.forEach(w=>{
      const src=w.reading
        ||(w.on_reading&&!w.kun_reading&&isHira(w.on_reading)?w.on_reading:null)
        ||(w.kun_reading&&!w.on_reading&&isKata(w.kun_reading)?w.kun_reading:null)
        ||'';
      if(src){
        const{on_reading,kun_reading}=splitOnKun(src);
        w.on_reading=on_reading||'';
        w.kun_reading=kun_reading||'';
        delete w.reading;
        migrated=true;
      }
    });
    if(migrated)save();
  }catch{}
}
function save(){
  try{
    localStorage.setItem('jl4',JSON.stringify({
      words:S.words,progress:S.progress,
      kanjiItems:S.kanjiItems,kanjiProgress:S.kanjiProgress,
      studyCfg:S.studyCfg,quizCfg:S.quizCfg,
    }));
  }catch{}
}

/* ── CSV parser ── */
const ALIAS={
  слово:'kanji',word:'kanji',кандзи:'kanji',kanji:'kanji',
  чтение:'reading',кана:'reading',reading:'reading',kana:'reading',
  'он':'on_reading','он-чтение':'on_reading',on:'on_reading',on_reading:'on_reading',onyomi:'on_reading',
  'кун':'kun_reading','кун-чтение':'kun_reading',kun:'kun_reading',kun_reading:'kun_reading',kunyomi:'kun_reading',
  значение:'meaning',meaning:'meaning',english:'meaning',eng:'meaning',
  перевод:'translation',translation:'translation',russian:'translation',rus:'translation',
  заметки:'notes',notes:'notes',note:'notes',
};
function parseLine(line,sep){
  const out=[];let cur='',q=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}
    else if(c===sep&&!q){out.push(cur.trim());cur='';}
    else cur+=c;
  }
  out.push(cur.trim());return out;
}
function detectSep(text){
  const row=text.split('\n')[0];
  const t=(row.match(/\t/g)||[]).length;
  // TAB имеет приоритет: табы никогда не встречаются внутри ячеек
  if(t>0)return'\t';
  const c=(row.match(/,/g)||[]).length,s=(row.match(/;/g)||[]).length;
  if(s>c)return';';return',';
}
function parseFile(text){
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const sep=detectSep(text);
  const rows=text.split(/\r?\n/).filter(l=>l.trim());
  if(rows.length<1)throw new Error('Файл пустой');
  const first=parseLine(rows[0],sep);
  const hasH=first.some(h=>{const k=h.toLowerCase().replace(/[\s\-]/g,'_');return!!(ALIAS[k]||ALIAS[h.toLowerCase()]);});
  if(!hasH){const rawRows=rows.map(r=>parseLine(r,sep));return{rawRows,colCount:first.length,hasHeaders:false};}
  const headers=first.map(h=>{const k=h.toLowerCase().replace(/[\s\-]/g,'_');return ALIAS[k]||ALIAS[h.toLowerCase()]||k;});
  const rawRows=rows.slice(1).map(r=>parseLine(r,sep));
  return{...applyMapping(rawRows,headers,S.importType==='kanji'),hasHeaders:true};
}
function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36);}
/* ── Katakana / Hiragana sets (explicit, from user spec) ── */
const KATA_SET=new Set([...'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヰヱヲンガギグゲゴザジズゼゾダヂヅデドバビブベボパピプペポァィゥェォッャュョヴ']);
const HIRA_SET=new Set([...'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわゐゑをんがぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽぁぃぅぇぉっゃゅょゔ']);
// ー (U+30FC) — нейтральный знак: определяем по предыдущему токену
function isHira(s){return[...s].some(c=>HIRA_SET.has(c));}
function isKata(s){return[...s].some(c=>KATA_SET.has(c));}
function splitOnKun(str){
  // Разбиваем по запятой, японской запятой, средней точке (・) и пробелам
  const parts=str.split(/[,、・\s]+/).filter(Boolean);
  const on=[],kun=[];
  for(let i=0;i<parts.length;i++){
    const p=parts[i];
    // Убираем ー и прочие нейтральные знаки для классификации
    const s=p.replace(/[ーー・～\u30FC\u30FE]/g,'');
    if(!s){
      // Токен состоит только из нейтральных знаков (напр. "ー")
      // Определяем по предыдущему классифицированному токену
      if(kun.length>0&&on.length===0)kun.push(p);
      else on.push(p);
      continue;
    }
    if(isKata(s)&&!isHira(s))on.push(p);
    else if(isHira(s)&&!isKata(s))kun.push(p);
    else on.push(p); // смешанный или неизвестный → он
  }
  return{on_reading:on.join('・'),kun_reading:kun.join('・')};
}
function applyMapping(rawRows,mapping,isKanji=false){
  const words=[];
  for(const vals of rawRows){
    if(vals.every(v=>!v))continue;
    const w={id:uid()};
    mapping.forEach((fk,j)=>{if(fk)w[fk]=(vals[j]||'').trim();});
    if(isKanji){
      // Находим поле с «сырыми» чтениями — это может быть reading, on_reading или kun_reading
      // (пользователь мог назначить не ту колонку)
      const combined=w.reading
        ||(w.on_reading&&!w.kun_reading&&isHira(w.on_reading)?w.on_reading:null)
        ||(w.kun_reading&&!w.on_reading&&isKata(w.kun_reading)?w.kun_reading:null)
        ||'';
      if(combined){
        const{on_reading,kun_reading}=splitOnKun(combined);
        w.on_reading=on_reading||'';
        w.kun_reading=kun_reading||'';
        delete w.reading;
      }
    }
    if(!w.kanji&&w.reading)w.kanji=w.reading.split(',')[0].trim();
    if(w.kanji)words.push(w);
  }
  if(!words.length)throw new Error('Нет записей с полем кандзи');
  const foundFields=[...new Set(mapping.filter(h=>h&&FK.includes(h)))];
  return{words,headers:foundFields,hasHeaders:true};
}
function defaultMapping(colCount,isKanji=false){
  const d=isKanji?['kanji','reading','meaning','translation','notes']:['kanji','reading','meaning','translation','notes'];
  return Array.from({length:colCount},(_,i)=>d[i]||'');
}

/* ── Data helpers ── */
function ds(type){return type==='kanji'?S.kanjiItems:S.words;}
function pr(type){return type==='kanji'?S.kanjiProgress:S.progress;}
function filtered(type,filter,count){
  const p=pr(type);
  let arr=filter==='all'?[...ds(type)]:ds(type).filter(w=>(p[w.id]||'unknown')===filter);
  if(count&&count!=='all')arr=shuffle(arr).slice(0,parseInt(count));
  return arr;
}
function shuffle(arr){return[...arr].sort(()=>Math.random()-.5);}
function buildStudyQueue(){return shuffle(filtered(S.studyCfg.type,S.studyCfg.filter,S.studyCfg.count));}
function buildQuizQ(){
  const{type,mode,answer:af,filter,count}=S.quizCfg;
  const qFields=Array.isArray(S.quizCfg.question)?S.quizCfg.question:[S.quizCfg.question];
  const optN=(mode==='choice4'?4:6);
  const pool=filtered(type,filter,count).filter(w=>w[af]&&qFields.some(f=>w[f]));
  if(pool.length<2)return null;
  const all=ds(type).filter(w=>w[af]);
  if(all.length<optN)return null;
  let qw=null;
  for(const c of shuffle(pool).slice(0,10)){if(qFields.some(f=>c[f])&&c[af]){qw=c;break;}}
  if(!qw)return null;
  const wrongs=shuffle(all.filter(w=>w.id!==qw.id&&w[af])).slice(0,optN-1).map(w=>w[af]);
  if(wrongs.length<optN-1)return null;
  const options=shuffle([...wrongs,qw[af]]);
  return{word:qw,qFields,aField:af,options,correct:options.indexOf(qw[af])};
}
function checkAns(user,correct){
  const n=s=>s.trim().toLowerCase().replace(/\s+/g,' ');
  const u=n(user);if(!u)return false;
  return correct.split(/[,;、。・\n]/).map(v=>n(v)).filter(Boolean).some(v=>v===u);
}
function bestAF(pref){
  const d=ds(S.quizCfg.type),has=f=>d.some(w=>w[f]);
  if(has(pref))return pref;
  for(const f of['reading','meaning','translation','kanji','on_reading','kun_reading'])
    if(f!==pref&&has(f))return f;
  return pref;
}
function sessionEnd(){
  const p=pr(S.studyCfg.type),res={know:0,learning:0,unknown:0};
  S.studyQueue.forEach(w=>{const s=p[w.id]||'unknown';res[s]=(res[s]||0)+1;});
  S.studyResults=res;
}

/* ── Card Variant Builder ── */
function cvMeanings(word,showFields){
  const has=f=>showFields.includes(f)&&word[f];
  const g=[];
  ['meaning','translation'].forEach(f=>{
    if(has(f))word[f].split(/;/).forEach(s=>{const t=s.trim();if(t)g.push(t);});
  });
  if(!g.length)return'';
  return`<div class="cv-meanings">${g.slice(0,7).map((s,i)=>`<div class="cv-mn"><span class="cv-mi">${i+1}</span>${esc(s)}</div>`).join('')}</div>`;
}

// Variant A: Kanji type + kanji field present
function cvKanjiCard(word,showFields){
  const has=f=>showFields.includes(f)&&word[f];
  const hasOn=has('on_reading'),hasKun=has('kun_reading');
  const readHtml=hasOn||hasKun?`<div class="cv-readings">
    ${hasOn?`<div class="cv-rrow"><span class="cv-rl">音</span><span class="cv-rv">${esc(word.on_reading)}</span></div>`:''}
    ${hasKun?`<div class="cv-rrow"><span class="cv-rl">訓</span><span class="cv-rv">${esc(word.kun_reading)}</span></div>`:''}
  </div>`:'';
  const mHtml=cvMeanings(word,showFields);
  return`<div class="cv-root">
    <div class="cv-kanji-main">
      <div class="cv-kanji-char">${esc(word.kanji)}</div>
      ${readHtml}
    </div>
    ${mHtml?'<div class="cv-sep"></div>'+mHtml:''}
  </div>`;
}

// Variant B: Word type + kanji (word) field present
function cvWordCard(word,showFields){
  const has=f=>showFields.includes(f)&&word[f];
  const mHtml=cvMeanings(word,showFields);
  return`<div class="cv-root">
    <div class="cv-word">${esc(word.kanji)}</div>
    ${has('reading')?`<div class="cv-kana">${esc(word.reading)}</div>`:''}
    ${mHtml?'<div class="cv-sep"></div>'+mHtml:''}
  </div>`;
}

// Variant C: Readings only (kanji type, no kanji field)
function cvReadingsCard(word,showFields){
  const has=f=>showFields.includes(f)&&word[f];
  const mHtml=cvMeanings(word,showFields);
  return`<div class="cv-root">
    ${has('on_reading')?`<div class="cv-rrow-lg"><span class="cv-rl">音</span><span class="cv-rv-lg">${esc(word.on_reading)}</span></div>`:''}
    ${has('kun_reading')?`<div class="cv-rrow-lg"><span class="cv-rl">訓</span><span class="cv-rv-lg">${esc(word.kun_reading)}</span></div>`:''}
    ${mHtml?'<div class="cv-sep"></div>'+mHtml:''}
  </div>`;
}

// Variant D: Kana reading only (word type, no kanji field)
function cvKanaCard(word,showFields){
  const mHtml=cvMeanings(word,showFields);
  return`<div class="cv-root">
    <div class="cv-kana-lg">${esc(word.reading)}</div>
    ${mHtml?'<div class="cv-sep"></div>'+mHtml:''}
  </div>`;
}

// Variant E: Meaning only
function cvMeaningOnlyCard(word,showFields){
  return`<div class="cv-root">${cvMeanings(word,showFields)||'<div style="color:var(--t2)">—</div>'}</div>`;
}

function buildCardVariant(word,showFields,dataType){
  if(!word||!showFields||!showFields.length)return'<div style="color:var(--t2);text-align:center">—</div>';
  const has=f=>showFields.includes(f)&&word[f];
  const isKanjiType=dataType==='kanji';

  if(has('kanji')){
    return isKanjiType?cvKanjiCard(word,showFields):cvWordCard(word,showFields);
  }
  if(isKanjiType&&(has('on_reading')||has('kun_reading'))){
    return cvReadingsCard(word,showFields);
  }
  if(!isKanjiType&&has('reading')){
    return cvKanaCard(word,showFields);
  }
  const mHtml=cvMeanings(word,showFields);
  if(mHtml)return`<div class="cv-root">${mHtml}</div>`;
  if(has('notes'))return`<div class="cv-root"><div style="font-size:12px;color:var(--t2);font-style:italic">${esc(word.notes)}</div></div>`;
  return'<div style="color:var(--t2);text-align:center">—</div>';
}

/* ── Card Front Builder ── */
function buildCardFront(word,frontField,dataType){
  const isKanjiType=dataType==='kanji';
  const val=word[frontField]||'—';
  if(frontField==='kanji'){
    return isKanjiType
      ?`<div class="fc-kanji">${esc(val)}</div>`
      :`<div class="fc-main">${esc(val)}</div>`;
  }
  if(frontField==='on_reading'){
    return`<div class="fc-lbl">音読み</div><div class="cv-kana-lg">${esc(val)}</div>`;
  }
  if(frontField==='kun_reading'){
    return`<div class="fc-lbl">訓読み</div><div class="cv-kana-lg">${esc(val)}</div>`;
  }
  if(frontField==='reading'){
    return`<div class="cv-kana-lg">${esc(val)}</div>`;
  }
  if(frontField==='meaning'||frontField==='translation'){
    const g=[];val.split(/;/).forEach(s=>{const t=s.trim();if(t)g.push(t);});
    if(g.length)return`<div class="fc-lbl">Значение</div><div class="cv-meanings">${
      g.slice(0,4).map((s,i)=>`<div class="cv-mn"><span class="cv-mi">${i+1}</span>${esc(s)}</div>`).join('')
    }</div>`;
  }
  return`<div class="fc-lbl">${FIELDS[frontField]?.label||frontField}</div><div class="fc-main sm">${esc(val)}</div>`;
}

/* ── Render ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){document.getElementById('app').innerHTML=buildApp();bindAll();}

function buildApp(){
  if(S.screen==='import')return buildImport();
  if(S.studyQueue.length&&!S.studyResults)return buildStudyActive()+nav();
  if(S.quizQ)return buildQuizActive()+nav();
  switch(S.tab){
    case'home':    return buildHome()+nav();
    case'tests':   return buildTests()+nav();
    case'words':   return buildWords()+nav();
    case'settings':return buildSettings()+nav();
  }
  return nav();
}

/* ── NAV ── */
const TABS=[
  {id:'home',   icon:'home',   lbl:'Главная'  },
  {id:'tests',  icon:'tests',  lbl:'Тесты'    },
  {id:'words',  icon:'words',  lbl:'Слова'    },
  {id:'settings',icon:'settings',lbl:'Настройки'},
];
function nav(){
  return`<nav class="bnav">${TABS.map(t=>`
    <button class="bnav-btn${S.tab===t.id?' active':''}" data-a="tab:${t.id}">
      <span class="bnav-icon">${ICONS[t.icon]}</span>
      <span>${t.lbl}</span>
    </button>`).join('')}</nav>`;
}

/* ── HOME ── */
function buildHome(){
  const type=S.homeTab,d=ds(type),p=pr(type);

    </div>
    <div class="stats">
      <div class="sbox g"><div class="snum">${know}</div><div class="slbl">Знаю</div></div>
      <div class="sbox y"><div class="snum">${learning}</div><div class="slbl">Учу</div></div>
      <div class="sbox r"><div class="snum">${unk}</div><div class="slbl">Не знаю</div></div>
    </div>

}

/* ── TESTS ── */
function buildTests(){
  if(S.studyResults)return buildStudyDone();
  return`
    <div class="phdr"><div class="top-icon">試</div><span class="phdr-title">Тесты</span></div>
    <div class="sub-tabs">
      <button class="stab${S.testsSubTab==='cards'?' on':''}" data-a="tests-sub:cards">📚 Карточки</button>
      <button class="stab${S.testsSubTab==='quiz'?' on':''}"  data-a="tests-sub:quiz">🎯 Квиз</button>
    </div>

function cfgCard(lbl,content){
  return`<div class="cfg-card"><div class="cfg-lbl">${lbl}</div>${content}</div>`;
}
function chips(items,activeVal,actionPrefix){
  return`<div class="chips">${items.map(it=>`<button class="chip${it.v===activeVal?' on':''}" data-a="${actionPrefix}:${it.v}">${it.l}</button>`).join('')}</div>`;
}

function buildCardsCfg(){
  const type=S.studyCfg.type;
  const d=ds(type);
  if(!d.length)return noData(type);
  const flds=type==='kanji'?KF:WF;
  const cnt=filtered(type,S.studyCfg.filter,S.studyCfg.count).length;
  const filterOpts=[{v:'all',l:'Все'},{v:'unknown',l:'Не знаю'},{v:'learning',l:'Учу'},{v:'know',l:'Знаю'}];
  const counts=[{v:'50',l:'50'},{v:'100',l:'100'},{v:'150',l:'150'},{v:'all',l:'Все'}];
  return`
    ${cfgCard('Что тренируем',chips([{v:'words',l:'Слова'},{v:'kanji',l:'Кандзи'}],type,'study-type'))}
    ${cfgCard('Лицевая сторона',`<div class="chips">${flds.map(k=>`<button class="chip${S.studyCfg.front===k?' on':''}" data-a="study-front:${k}">${FIELDS[k].short}</button>`).join('')}</div>`)}
    ${cfgCard('Оборотная сторона',`<div class="chips" id="chips-back">${flds.map(k=>`<button class="chip${S.studyCfg.back.includes(k)?' on':''}" data-field="${k}">${FIELDS[k].short}</button>`).join('')}</div>`)}
    <div class="cfg-row">
      ${cfgCard('Фильтр',chips(filterOpts,S.studyCfg.filter,'study-filter'))}
      ${cfgCard('Количество',chips(counts,S.studyCfg.count,'study-count'))}
    </div>
    <div class="start-row"><button class="start-btn" data-a="start-study">Начать (${cnt})</button></div>`;
}

function buildQuizCfg(){
  const type=S.quizCfg.type;
  const d=ds(type);
  if(d.length<4)return`<div class="empty"><div class="ei">🎯</div><div class="et">Мало данных</div><div class="eb">Нужно минимум 4 записи (сейчас ${d.length})</div><button class="btn btn-p" style="margin:0 16px;width:calc(100%-32px)" data-a="go-import-home">Импорт</button></div>`;
  const flds=type==='kanji'?KF:WF;
  const filterOpts=[{v:'all',l:'Все'},{v:'unknown',l:'Не знаю'},{v:'learning',l:'Учу'},{v:'know',l:'Знаю'}];
  const counts=[{v:'50',l:'50'},{v:'100',l:'100'},{v:'150',l:'150'},{v:'all',l:'Все'}];
  const modes=[{v:'choice4',l:'4 варианта'},{v:'choice6',l:'6 вариантов'},{v:'input',l:'Вписать'},{v:'mix',l:'Микс'}];
  return`
    ${cfgCard('Что тренируем',chips([{v:'words',l:'Слова'},{v:'kanji',l:'Кандзи'}],type,'quiz-type'))}
    ${cfgCard('Режим ответа',chips(modes,S.quizCfg.mode,'quiz-mode'))}
    ${cfgCard('Что в вопросе (несколько)',`<div class="chips" id="chips-q">${flds.map(k=>`<button class="chip${S.quizCfg.question.includes(k)?' on':''}" data-qfield="${k}">${FIELDS[k].short}</button>`).join('')}</div>`)}
    ${cfgCard('Что отгадываем (одно)',`<div class="chips">${flds.map(k=>`<button class="chip${S.quizCfg.answer===k?' on':''}" data-a="quiz-afield:${k}">${FIELDS[k].short}</button>`).join('')}</div>`)}
    <div class="cfg-row">
      ${cfgCard('Фильтр',chips(filterOpts,S.quizCfg.filter,'quiz-filter'))}
      ${cfgCard('Количество',chips(counts,S.quizCfg.count,'quiz-count'))}
    </div>
    <div class="start-row"><button class="start-btn" data-a="start-quiz">Начать</button></div>`;
}

/* ── STUDY ACTIVE ── */
function buildStudyActive(){
  if(S.studyResults)return buildStudyDone();
  const w=S.studyQueue[S.studyIdx];
  if(!w){sessionEnd();return buildStudyDone();}
  const total=S.studyQueue.length,curr=S.studyIdx+1,pct=Math.round(curr/total*100);
  const p=pr(S.studyCfg.type),status=p[w.id]||'unknown';
  const sClass=status==='know'?'g':status==='learning'?'y':'r';
  const front=S.studyCfg.front,isKanji=S.studyCfg.type==='kanji';

  // Build front face content using buildCardFront
  const frontBody=buildCardFront(w,front,S.studyCfg.type)
    +(!S.cardFlipped?`<div class="fc-tap">нажмите чтобы перевернуть</div>`:``);


  // Build back face using card variant
  const backVariant=buildCardVariant(w,S.studyCfg.back,S.studyCfg.type);

  return`
    <div class="fc-counter">${curr}/${total}</div>
    <div class="fc-wrap" data-a="flip">
      <div class="fc${S.cardFlipped?' flipped':''}">
        <div class="fc-face">
          <div class="fc-sbar ${sClass}"></div>
          ${frontBody}
        </div>
        <div class="fc-face fc-back">
          <div class="fc-sbar ${sClass}"></div>
          <div class="fc-back-body">${backVariant}</div>
        </div>
      </div>
    </div>
    <div class="mark-row">
      <button class="mbtn r" data-a="mark:unknown">✕ Не знаю</button>
      <button class="mbtn y" data-a="mark:learning">∼ Учу</button>
      <button class="mbtn g" data-a="mark:know">✓ Знаю</button>
    </div>
    <div class="stop-row">
      <button class="stop-btn" data-a="stop-study">Стоп</button>
      <button class="stop-btn" data-a="skip-card">Пропустить</button>
    </div>`;
}

function buildStudyDone(){
  const r=S.studyResults||{know:0,learning:0,unknown:0};
  const total=r.know+r.learning+r.unknown;
  return`
    <div class="done">
      <div class="done-i">🎉</div>
      <h2>Сессия завершена!</h2>
      <p style="color:var(--t2);margin-top:6px;font-size:13px">Пройдено: ${total} карточек</p>
      <div class="res-grid">
        <div class="rc g"><div class="rn">${r.know}</div><div class="rl">Знаю</div></div>
        <div class="rc y"><div class="rn">${r.learning}</div><div class="rl">Учу</div></div>
        <div class="rc r"><div class="rn">${r.unknown}</div><div class="rl">Не знаю</div></div>
      </div>
      <div style="padding:0 16px">
        <div class="btn-row">
          <button class="btn btn-p" data-a="restart-study">🔄 Снова</button>
          <button class="btn btn-s" data-a="stop-study">Завершить</button>
        </div>
      </div>
    </div>`;
}

/* ── QUIZ ACTIVE ── */
function buildQuizActive(){
  const q=S.quizQ;if(!q)return'';
  const{ok,bad}=S.quizScore;
  const mode=S.quizCfg.mode;
  const showChoice=mode==='choice4'||mode==='choice6'||mode==='mix';
  const showInput=mode==='input'||mode==='mix';
  const optN=mode==='choice4'?4:6;

  const scoreBar=`
    <div class="qscore">
      <div class="qscore-item qscore-bad">
        <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 1l10 8M11 1L1 9" stroke="#ff3c3c" stroke-width="1.8" stroke-linecap="round"/></svg>
        ${bad}
      </div>
      <div class="qscore-item qscore-ok">
        <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M1 5l4 4L13 1" stroke="#7aff78" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        ${ok}
      </div>
      <div class="qscore-item qscore-total" style="color:var(--al)">итого ${ok+bad}</div>
      <button class="stop-btn" style="padding:0 14px;height:27px;width:auto;border-radius:16px" data-a="stop-quiz">Стоп</button>
    </div>`;

  const qCard=`
    <div class="quiz-q">
      ${buildCardVariant(q.word,q.qFields,S.quizCfg.type)}
    </div>`;

  let choiceHtml='';
  if(showChoice&&q.options){
    choiceHtml=`<div class="quiz-opts">
      ${q.options.slice(0,optN).map((opt,i)=>{
        let cls='';
        if(S.quizDone)cls=i===q.correct?'ok':i===S.quizSel?'bad':'';
        return`<button class="qopt ${cls}" ${S.quizDone?'disabled':''} data-a="quiz-ans:${i}">${esc(opt)}</button>`;
      }).join('')}
    </div>`;
  }

  let inputHtml='';
  if(showInput){
    const isOk=S.quizDone?checkAns(S.quizInputVal,q.options[q.correct]):null;
    const iCls=S.quizDone?(isOk?'ok':'bad'):'';
    inputHtml=`
      <div class="quiz-inp-wrap">
        <div class="quiz-inp-lbl">Впишите вариант:</div>
        <input id="quiz-input" class="quiz-inp ${iCls}" type="text"
          placeholder="Ваш ответ..."
          value="${S.quizDone?esc(S.quizInputVal):''}"
          ${S.quizDone?'disabled':''}
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        ${S.quizDone&&mode==='input'?`<div class="quiz-result ${isOk?'ok':'bad'}">${isOk?'✓ Правильно!':'✗ Правильно: '+esc(q.options[q.correct])}</div>`:''}
      </div>`;
  }

  const nextBtn=S.quizDone
    ?`<button class="next-btn" data-a="next-q">Следующий →</button>`
    :(showInput&&!showChoice?`<button class="next-btn" data-a="quiz-check">Проверить</button>`:'');

  return`<div class="pg">${scoreBar}${qCard}${choiceHtml}${inputHtml}${nextBtn}</div>`;
}

/* ── WORDS ── */
function buildWords(){
  const type=S.wordsTab,d=ds(type),p=pr(type);
  const list=S.wordsSearch
    ?d.filter(w=>{const q=S.wordsSearch.toLowerCase();
        return(w.kanji||'').toLowerCase().includes(q)||
               (w.reading||w.on_reading||w.kun_reading||'').toLowerCase().includes(q)||
               (w.meaning||w.translation||'').toLowerCase().includes(q);})
    :d;
  return`
    <div class="phdr"><div class="top-icon">語</div><span class="phdr-title">Слова</span></div>
    <div class="wfilter">
      <button class="wf-tab${type==='words'?' on':''}" data-a="words-tab:words">Слова</button>
      <button class="wf-tab${type==='kanji'?' on':''}" data-a="words-tab:kanji">Кандзи</button>
      <button class="wf-import" data-a="words-import">Импорт ↑</button>
      <button class="wf-search" data-a="words-search-toggle">🔍 Поиск</button>
    </div>
    <div class="wsearch-wrap">
      <span class="wsearch-icon">🔍</span>
      <input id="words-search" class="wsearch" type="text"
        placeholder="Поиск..."
        value="${esc(S.wordsSearch)}"
        autocomplete="off" autocorrect="off">
    </div>
    ${!d.length
      ?`<div class="empty"><div class="ei">${type==='kanji'?'㊙️':'📖'}</div><div class="et">Нет ${type==='kanji'?'кандзи':'слов'}</div><div class="eb">Импортируйте CSV/TSV файл</div><button class="btn btn-p" style="margin:0 16px;width:calc(100% - 32px)" data-a="words-import">Импортировать</button></div>`
      :`<div class="wlist">
          ${list.map(w=>{
            const s=p[w.id]||'unknown';
            const dc=s==='know'?'g':s==='learning'?'y':'';
            if(type==='kanji'){
              return`<div class="witem">
                <div class="wkanji">${esc(w.kanji)}</div>
                <div class="winfo">
                  ${w.on_reading?`<div class="wok">он: ${esc(w.on_reading)}</div>`:''}
                  ${w.kun_reading?`<div class="wok">кун: ${esc(w.kun_reading)}</div>`:''}
                  <div class="wtrans">${esc(w.meaning||w.translation||'')}</div>
                </div>
                <div class="wdot ${dc}"></div>
              </div>`;
            }
            return`<div class="witem">
              <div class="wkanji">${esc(w.kanji)}</div>
              <div class="winfo">
                <div class="wreading">${esc(w.reading||'')}</div>
                <div class="wtrans">${esc(w.translation||w.meaning||'')}</div>
              </div>
              <div class="wdot ${dc}"></div>
            </div>`;
          }).join('')}
        </div>
        ${list.length!==d.length?`<div style="font-size:12px;color:var(--al);text-align:center;padding:4px">Найдено: ${list.length} из ${d.length}</div>`:''}`
    }`;
}

/* ── IMPORT ── */
function buildImport(){
  return`
    <div class="phdr">
      <button class="phdr-back" data-a="back-import">← Назад</button>
      <span class="phdr-title">Импорт</span>
    </div>
    ${S.importStep==='map'&&S.importRaw?buildColMap()
    :S.importStep==='preview'&&S.importPreview?buildUploadZone()+buildPreview()
    :buildTypeSelect()+buildUploadZone()}`;
}
function buildTypeSelect(){
  return`${cfgCard('Что импортируем',chips([{v:'words',l:'Слова'},{v:'kanji',l:'Кандзи'}],S.importType,'import-type'))}`;
}
function buildUploadZone(){
  return`
    <div class="dropzone" id="dropzone">
      <div class="dz-icon">📂</div>
      <div class="dz-text">Нажмите или перетащите файл</div>
      <div class="dz-hint">CSV и TSV — с заголовками и без</div>
      <input type="file" id="file-in" accept=".csv,.tsv,.txt" style="display:none">
    </div>
    ${S.importErr?`<div class="err-box">⚠️ ${esc(S.importErr)}</div>`:''}`;
}
function buildColMap(){
  const{rawRows,colCount}=S.importRaw;
  // Тип можно менять прямо здесь — dropdowns обновятся при ре-рендере
  const typeRow=buildTypeSelect();
  const fk=S.importType==='kanji'?KF:WF;
  const heads=Array.from({length:colCount},(_,i)=>{
    const cur=S.importMapping[i]||'';
    const opts=[`<option value="">— пропустить —</option>`,...fk.map(k=>`<option value="${k}"${cur===k?' selected':''}>${FIELDS[k].label}</option>`)].join('');
    return`<th style="min-width:120px;padding:6px 8px"><select id="map-col-${i}" style="width:100%;font-size:12px;background:var(--bg);color:var(--t);border:1px solid var(--c2);border-radius:6px;padding:4px 6px">${opts}</select></th>`;
  }).join('');
  const drows=rawRows.slice(0,5).map(row=>`<tr>${Array.from({length:colCount},(_,i)=>`<td title="${esc(row[i]||'')}">${esc(row[i]||'')}</td>`).join('')}</tr>`).join('');
  return`
    ${typeRow}
    <div class="cfg-card">
      <div class="cfg-lbl">Назначьте колонки</div>
      <div class="tbl-wrap" style="margin:0 0 10px">
        <table><thead><tr>${heads}</tr></thead><tbody>${drows}</tbody></table>
      </div>
      ${rawRows.length>5?`<div style="font-size:12px;color:var(--al);margin-bottom:8px">...всего ${rawRows.length} строк</div>`:''}
    </div>
    <div style="display:flex;gap:8px;padding:0 16px">
      <button class="btn btn-s" data-a="back-import">← Назад</button>
      <button class="btn btn-p" data-a="apply-map">Применить →</button>
    </div>`;
}
function buildPreview(){
  const{words,headers}=S.importPreview;
  const show=words.slice(0,6);
  return`
    <div class="cfg-card">
      <div class="cfg-lbl">Предпросмотр — ${words.length} записей</div>
      <div class="tbl-wrap" style="margin:0 0 10px">
        <table><thead><tr>${headers.map(h=>`<th>${FIELDS[h]?.short||h}</th>`).join('')}</tr></thead>
        <tbody>${show.map(w=>`<tr>${headers.map(h=>`<td>${esc(w[h]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table>
      </div>
      ${words.length>6?`<div style="font-size:12px;color:var(--al);margin-bottom:8px">...и ещё ${words.length-6}</div>`:''}
    </div>
    <div style="display:flex;gap:8px;padding:0 16px">
      <button class="btn btn-s" data-a="cancel-import">← Назад</button>
      <button class="btn btn-p" data-a="confirm-import">✓ Импортировать ${words.length}</button>
    </div>`;
}
function noData(type){
  return`<div class="empty"><div class="ei">${type==='kanji'?'㊙️':'📖'}</div><div class="et">Нет ${type==='kanji'?'кандзи':'слов'}</div><div class="eb">Сначала импортируйте данные</div><button class="btn btn-p" style="margin:0 16px;width:calc(100% - 32px)" data-a="go-import-home">Импорт</button></div>`;
}

let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2200);
}

/* ── Actions ── */
function act(action){
  const ci=action.indexOf(':');
  const type=ci>-1?action.slice(0,ci):action;
  const val=ci>-1?action.slice(ci+1):'';

  switch(type){
    case'tab':
      S.tab=val;S.confirmPending=null;
      if(val!=='tests'){S.studyQueue=[];S.studyResults=null;S.quizQ=null;S.quizDone=false;}
      break;
    case'home-tab':   S.homeTab=val;break;
    case'words-tab':  S.wordsTab=val;S.wordsSearch='';break;
    case'tests-sub':  S.testsSubTab=val;break;
    case'words-search-toggle': document.getElementById('words-search')?.focus(); return;

    case'go-cards':
      S.tab='tests';S.testsSubTab='cards';S.studyCfg.type=S.homeTab;S.studyQueue=[];S.studyResults=null;break;
    case'go-quiz':
      S.tab='tests';S.testsSubTab='quiz';S.quizCfg.type=S.homeTab;S.quizQ=null;S.quizDone=false;break;
    case'go-import-home':
      S.screen='import';S.importType=S.homeTab;S.importStep='type';S.importPreview=null;S.importErr=null;S.importRaw=null;break;
    case'words-import':
      S.screen='import';S.importType=S.wordsTab;S.importStep='type';S.importPreview=null;S.importErr=null;S.importRaw=null;break;

    case'import-type':
      S.importType=val;
      // Если уже в шаге маппинга — обновить дефолтные подписи колонок
      if(S.importRaw)S.importMapping=defaultMapping(S.importRaw.colCount,val==='kanji');
      break;
    case'back-import':
      if(S.importStep==='map'){S.importStep='type';S.importRaw=null;S.importMapping=[];}
      else if(S.importStep==='preview'){S.importStep=S.importRaw?'map':'type';S.importPreview=null;}
      else{S.screen='main';S.importStep='type';S.importPreview=null;S.importErr=null;S.importRaw=null;}
      break;
    case'cancel-import':S.importPreview=null;S.importStep=S.importRaw?'map':'type';break;
    case'apply-map':{
      if(!S.importRaw)break;
      const mapping=Array.from({length:S.importRaw.colCount},(_,i)=>{
        const el=document.getElementById(`map-col-${i}`);return el?el.value:(S.importMapping[i]||'');
      });
      if(!mapping.includes('kanji')&&!mapping.includes('reading')){toast('Назначьте колонку кандзи или чтения');return;}
      try{S.importPreview=applyMapping(S.importRaw.rawRows,mapping,S.importType==='kanji');S.importStep='preview';S.importErr=null;}
      catch(e){S.importErr=e.message;}
      break;
    }
    case'confirm-import':
      if(S.importPreview){
        const nw=S.importPreview.words;
        if(S.importType==='kanji'){
          // Страховочный проход: если reading не был разбит на on/kun — делаем это сейчас
          nw.forEach(w=>{
            if(w.reading&&!w.on_reading&&!w.kun_reading){
              const{on_reading,kun_reading}=splitOnKun(w.reading);
              if(on_reading)w.on_reading=on_reading;
              if(kun_reading)w.kun_reading=kun_reading;
              delete w.reading;
            }
          });
          const ex={};S.kanjiItems.forEach(w=>{ex[w.kanji]=w;});
          nw.forEach(w=>{const o=ex[w.kanji];if(o&&S.kanjiProgress[o.id]){S.kanjiProgress[w.id]=S.kanjiProgress[o.id];delete S.kanjiProgress[o.id];}});
          const ns=new Set(nw.map(w=>w.kanji));S.kanjiItems=[...S.kanjiItems.filter(w=>!ns.has(w.kanji)),...nw];
        } else {
          const ex={};S.words.forEach(w=>{ex[w.kanji]=w;});
          nw.forEach(w=>{const o=ex[w.kanji];if(o&&S.progress[o.id]){S.progress[w.id]=S.progress[o.id];delete S.progress[o.id];}});
          const ns=new Set(nw.map(w=>w.kanji));S.words=[...S.words.filter(w=>!ns.has(w.kanji)),...nw];
        }
        S.importPreview=null;S.importRaw=null;S.importStep='type';S.screen='main';
        save();toast(`Импортировано ${nw.length} записей`);
      }
      break;

    case'study-type':
      S.studyCfg.type=val;S.studyCfg.front='kanji';
      S.studyCfg.back=val==='kanji'?['meaning']:['reading','translation'];break;
    case'study-front':S.studyCfg.front=val;break;
    case'study-filter':S.studyCfg.filter=val;break;
    case'study-count':S.studyCfg.count=val;break;
    case'start-study':
      S.studyQueue=buildStudyQueue();
      if(!S.studyQueue.length){toast('Нет карточек для этого фильтра');return;}
      S.studyIdx=0;S.cardFlipped=false;S.studyResults=null;break;
    case'flip':S.cardFlipped=!S.cardFlipped;haptic('light');break;
    case'mark':{
      const w=S.studyQueue[S.studyIdx];
      if(w){pr(S.studyCfg.type)[w.id]=val;save();haptic();S.studyIdx++;S.cardFlipped=false;
        if(S.studyIdx>=S.studyQueue.length)sessionEnd();}
      break;}
    case'skip-card':
      S.studyIdx++;S.cardFlipped=false;
      if(S.studyIdx>=S.studyQueue.length)sessionEnd();break;
    case'stop-study':
      S.studyQueue=[];S.studyResults=null;S.tab='tests';S.testsSubTab='cards';break;
    case'restart-study':
      S.studyQueue=buildStudyQueue();S.studyIdx=0;S.cardFlipped=false;S.studyResults=null;break;

    case'quiz-type':
      S.quizCfg.type=val;S.quizCfg.question=['kanji'];S.quizCfg.answer=val==='kanji'?'meaning':'reading';break;
    case'quiz-mode':S.quizCfg.mode=val;break;
    case'quiz-afield':S.quizCfg.answer=val;break;
    case'quiz-filter':S.quizCfg.filter=val;break;
    case'quiz-count':S.quizCfg.count=val;break;
    case'start-quiz':
      S.quizCfg.answer=bestAF(S.quizCfg.answer);
      S.quizScore={ok:0,bad:0};S.quizQ=buildQuizQ();S.quizDone=false;S.quizSel=-1;S.quizInputVal='';
      if(!S.quizQ)toast('Недостаточно данных (нужно ≥4 с заполненными полями)');break;
    case'quiz-check':{
      if(!S.quizDone&&S.quizQ){
        const inp=document.getElementById('quiz-input');
        S.quizInputVal=inp?inp.value:'';S.quizDone=true;
        const ok=checkAns(S.quizInputVal,S.quizQ.options[S.quizQ.correct]);
        const w=S.quizQ.word,p=pr(S.quizCfg.type);
        if(ok){S.quizScore.ok++;haptic('light');if(!p[w.id]||p[w.id]==='unknown'){p[w.id]='learning';save();}}
        else{S.quizScore.bad++;haptic('medium');}
      }
      break;}
    case'quiz-ans':{
      if(!S.quizDone&&S.quizQ){
        const mode=S.quizCfg.mode;
        if(mode==='mix'){
          const inp=document.getElementById('quiz-input');
          const iv=inp?inp.value:'';
          if(iv.trim()){
            S.quizInputVal=iv;S.quizSel=parseInt(val);S.quizDone=true;
            const ok=checkAns(iv,S.quizQ.options[S.quizQ.correct]);
            const w=S.quizQ.word,p=pr(S.quizCfg.type);
            if(ok){S.quizScore.ok++;haptic('light');if(!p[w.id]||p[w.id]==='unknown'){p[w.id]='learning';save();}}
            else{S.quizScore.bad++;haptic('medium');}
            break;
          }
        }
        const idx=parseInt(val);S.quizSel=idx;S.quizDone=true;
        const ok=idx===S.quizQ.correct;
        const w=S.quizQ.word,p=pr(S.quizCfg.type);
        if(ok){S.quizScore.ok++;haptic('light');if(!p[w.id]||p[w.id]==='unknown'){p[w.id]='learning';save();}}
        else{S.quizScore.bad++;haptic('medium');}
      }
      break;}
    case'next-q':
      S.quizQ=buildQuizQ();S.quizDone=false;S.quizSel=-1;S.quizInputVal='';
      if(!S.quizQ)toast('Нет вопросов — проверьте фильтр');break;
    case'stop-quiz':
      S.quizQ=null;S.quizDone=false;S.quizInputVal='';S.tab='tests';S.testsSubTab='quiz';break;

    case'reset-progress':S.confirmPending='reset-progress';break;
    case'clear-words':   S.confirmPending='clear-words';break;
    case'confirm-no':    S.confirmPending=null;break;
    case'confirm-yes':
      if(S.confirmPending==='reset-progress'){
        S.progress={};S.kanjiProgress={};save();toast('Прогресс сброшен');
      } else if(S.confirmPending==='clear-words'){
        S.words=[];S.progress={};S.kanjiItems=[];S.kanjiProgress={};
        S.studyQueue=[];S.quizQ=null;save();toast('Данные удалены');
      }
      S.confirmPending=null;break;
  }
  render();
}

/* ── Events ── */
function setupDelegation(){
  document.addEventListener('click',e=>{
    const el=e.target.closest('[data-a]');if(el)act(el.dataset.a);
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      const qi=document.getElementById('quiz-input');
      if(qi&&document.activeElement===qi)act('quiz-check');
    }
  });
}
function bindAll(){
  // Back-chips toggle (study)
  const cb=document.getElementById('chips-back');
  if(cb)cb.addEventListener('click',e=>{
    const chip=e.target.closest('[data-field]');if(!chip)return;
    const f=chip.dataset.field,i=S.studyCfg.back.indexOf(f);
    if(i>=0)S.studyCfg.back=S.studyCfg.back.filter(x=>x!==f);
    else S.studyCfg.back=[...S.studyCfg.back,f];
    chip.classList.toggle('on');
  });
  // Question-chips toggle (quiz, multi-select)
  const cq=document.getElementById('chips-q');
  if(cq)cq.addEventListener('click',e=>{
    const chip=e.target.closest('[data-qfield]');if(!chip)return;
    const f=chip.dataset.qfield,i=S.quizCfg.question.indexOf(f);
    if(i>=0){if(S.quizCfg.question.length>1)S.quizCfg.question=S.quizCfg.question.filter(x=>x!==f);}
    else S.quizCfg.question=[...S.quizCfg.question,f];
    chip.classList.toggle('on',S.quizCfg.question.includes(f));
  });
  // Word search
  const ws=document.getElementById('words-search');
  if(ws){
    ws.addEventListener('input',e=>{S.wordsSearch=e.target.value;render();});
  }
  // File drop
  const dz=document.getElementById('dropzone'),fin=document.getElementById('file-in');
  if(dz&&fin){
    dz.onclick=()=>fin.click();
    fin.onchange=e=>{const f=e.target.files[0];if(f)readFile(f);};
    dz.ondragover=e=>{e.preventDefault();dz.classList.add('over');};
    dz.ondragleave=()=>dz.classList.remove('over');
    dz.ondrop=e=>{e.preventDefault();dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f)readFile(f);};
  }
  // Quiz input focus
  const qi=document.getElementById('quiz-input');
  if(qi&&!S.quizDone)setTimeout(()=>qi.focus(),50);
}
function readFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const r=parseFile(e.target.result);
      if(!r.hasHeaders){S.importRaw=r;S.importMapping=defaultMapping(r.colCount,S.importType==='kanji');S.importStep='map';S.importPreview=null;S.importErr=null;}
      else{S.importPreview=r;S.importStep='preview';S.importRaw=null;S.importErr=null;}
    }catch(err){S.importErr=err.message;S.importPreview=null;S.importRaw=null;S.importStep='type';}
    render();
  };
  reader.readAsText(file,'UTF-8');
}

/* ── Boot ── */
load();
setupDelegation();
render();
</script>
